  # --- 2.5 FLAGSHIP GLM-5.2 ---
  - name: €€€☁️ GLM-5.2 │ ⚡🔧 Fast (No Reasoning) [200K]
    provider: openai
    apiBase: https://api.z.ai/api/coding/paas/v4
    apiKey: ${{ secrets.ZAI_API_KEY }}
    roles:
      - chat
      - edit
      - apply
    model: glm-5.2
    defaultCompletionOptions:
      contextLength: 200000
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        thinking:
          type: disabled
          reasoning_effort: none

  - name: €€€☁️ GLM-5.2 │ 🧠🔧 Balanced (High Reasoning) [200K]
    provider: openai
    apiBase: https://api.z.ai/api/coding/paas/v4
    apiKey: ${{ secrets.ZAI_API_KEY }}
    roles:
      - chat
      - edit
      - apply
      - summarize
    model: glm-5.2
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 200000
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        thinking:
          type: enabled
          reasoning_effort: high

  - name: €€€€☁️ GLM-5.2 │ 🧠🔧📦 Deep (Max Reasoning) [1M]
    provider: openai
    apiBase: https://api.z.ai/api/coding/paas/v4
    apiKey: ${{ secrets.ZAI_API_KEY }}
    roles:
      - chat
      - edit
      - apply
      - summarize
    model: glm-5.2
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 1000000
      maxTokens: 16384
    requestOptions:
      extraBodyProperties:
        thinking:
          type: enabled
          reasoning_effort: max

  # --- 3.1 CLOUDFLARE GLM-5.2 ---
  - name: "🆓☁️ GLM-5.2 Cloudflare [128K] · 💬✏️🔧"
    provider: openai
    model: "@cf/zai-org/glm-5.2"
    apiBase: https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/ai/v1
    apiKey: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      contextLength: 128000
      maxTokens: 8192

# =============================================================================
# CONTEXT PROVIDERS
# =============================================================================
context:
  - provider: web
    params:
      apiBase: https://api.tavily.com
      apiKey: ${{ secrets.TAVILY_API_KEY }}
      model: tavily-searchcontext
  - provider: currentFile
  - provider: file
  - provider: os
  - provider: problems

# =============================================================================
# MCP SERVERS
# =============================================================================
mcpServers:
  # ---------------------------------------------------------------------------
  # 1. Vision MCP (lokal, stdio)
  # ---------------------------------------------------------------------------
  - name: zai-vision
    command: /usr/bin/npx
    args:
      - -y
      - "@z_ai/mcp-server@latest"
    env:
      Z_AI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      Z_AI_MODE: ZAI
    alwaysAllow:
      - ui_to_artifact
      - extract_text_from_screenshot
      - diagnose_error_screenshot
      - understand_technical_diagram
      - analyze_data_visualization
      - ui_diff_check
      - image_analysis
      - video_analysis

  # ---------------------------------------------------------------------------
  # 2. Web Search MCP (remote, HTTP)
  # ---------------------------------------------------------------------------
  - name: zai-web-search
    type: streamable-http
    url: https://api.z.ai/api/mcp/web_search_prime/mcp
    requestOptions:
      headers:
        Authorization: Bearer ${{ secrets.ZAI_API_KEY }}
    alwaysAllow:
      - webSearchPrime

  # ---------------------------------------------------------------------------
  # 3. Web Reader MCP (remote, HTTP)
  # ---------------------------------------------------------------------------
  - name: zai-web-reader
    type: streamable-http
    url: https://api.z.ai/api/mcp/web_reader/mcp
    requestOptions:
      headers:
        Authorization: Bearer ${{ secrets.ZAI_API_KEY }}
    alwaysAllow:
      - webReader

  # ---------------------------------------------------------------------------
  # 4. Zread MCP (DEAKTIVIERT)
  # ---------------------------------------------------------------------------
  - name: zai-zread
    type: streamable-http
    url: https://api.z.ai/api/mcp/zread/mcp
    requestOptions:
      headers:
        Authorization: Bearer ${{ secrets.ZAI_API_KEY }}
    alwaysAllow:
      - search_doc
      - read_file
      - get_repo_structure
    enabled: false

  # ---------------------------------------------------------------------------
  # 5. GitHub MCP (lokal, stdio)
  # ---------------------------------------------------------------------------
  - name: github
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}

  # ---------------------------------------------------------------------------
  # 6. Playwright MCP (lokal, stdio)
  # ---------------------------------------------------------------------------
  - name: playwright
    command: npx
    args:
      - "@playwright/mcp@latest"

  # ---------------------------------------------------------------------------
  # 7. Context7 MCP (DEAKTIVIERT)
  # ---------------------------------------------------------------------------
  - name: context7
    type: streamable-http
    url: https://mcp.context7.com/mcp
    requestOptions:
      headers:
        CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
    enabled: false
