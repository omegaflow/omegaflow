%YAML 1.1
---
name: Architecture Specification
version: 2.0.0

# ===========================================================================
# RENDER PIPELINE
# ===========================================================================
# Pass 1: Ellipsoid + SRTM
#   80,000 vertices displaced by elevation. ~0.1 ms GPU.
# Pass 2: Atmosphere + Airglow + Aurora
#   Ray-marched Rayleigh + Mie scattering. ~0.5 ms GPU.
# Pass 3: ACG Corridors
#   GPU polylines with additive blending. ~0.05 ms.
# Pass 4: Cities
#   Point primitives. ~0.01 ms.

# ===========================================================================
# EARTH LAYERS (1-12)
# ===========================================================================
#
# Layer 1: Seismic
#   Normal mode 0S0. Period: 20.5 min. Freq: 0.00081 Hz.
#   Octaved: 0.00081 Hz × 2^16 = 53 Hz.
#   Source: USGS Earthquake Catalog.
#
# Layer 2: Telluric
#   Electric currents in crust. 1-100 mA/m².
#   Source: USGS Fault Database.
#
# Layer 3: Geothermal
#   47 TW total heat flow.
#   Source: EOSDIS MODIS Land Surface Temperature.
#
# Layer 4: Tides
#   Up to 50 cm at coast, 30 cm in Alps.
#   Computed from Moon/Sun (Doodson numbers).
#
# Layer 5: Ocean Currents
#   Thermohaline circulation. 1000-year cycle.
#   Source: OSCAR.
#
# Layer 6: Bioluminescence
#   Dinoflagellates, fireflies.
#   Source: GBIF 0.1.0.
#
# Layer 7: Airglow
#   Night-sky luminescence. ~10^-8 W/cm²/sr.
#   Oxygen green 557.7 nm, oxygen red 630.0 nm,
#   sodium D 589.0/589.6 nm, OH Meinel 600-2500 nm.
#   Sources: Meinel (1950), Chamberlain (1961),
#   Bates & Nicolet (1950).
#
# Layer 8: Aurora
#   OVATION Aurora Forecast Model.
#   Source: tobari Kp index.
#
# Layer 9: Ionosphere
#   Sq magnetic field. Solar EUV.
#
# Layer 10: Atmospheric Gravity Waves
#   Break in mesosphere. Modulate airglow.
#
# Layer 11: Solar Wind
#   400-800 km/s. 1-10 particles/cm³.
#
# Layer 12: Cosmic Radiation
#   ~10,000 particles/second through the body.
#   Computable from altitude and geomagnetic latitude.

# ===========================================================================
# COSMOS LAYERS (13-24)
# ===========================================================================
#
# Layer 13: Heliosphere
#   Parker spiral model. 4-8 sectors. Scale: 120 AU.
#
# Layer 14: Heliopause
#   Scale: 120 AU.
#
# Layer 15: Local Interstellar Cloud
#   Scale: 30 light-years. Model: Redfield & Linsky (2008).
#
# Layer 16: 21-cm Hydrogen
#   1420.405 MHz. Discovered 1951 (Ewen & Purcell).
#   LAB Survey (Leiden/Argentine/Bonn). ~10 MB.
#
# Layer 17: Spiral Arms
#   4 major arms. Model: Vallée (2008). Scale: 50 kpc.
#
# Layer 18: Sgr A*
#   4 million solar masses. Scale: 26,000 light-years.
#
# Layer 19: Galactic Magnetic Field
#   ~1-10 µG. Model: Jansson & Farrar (2012). Scale: 50 kpc.
#
# Layer 20: Gamma-Ray Bursts
#   ~1 per day detected by SWIFT. Scale: Gpc.
#
# Layer 21: Neutrino Background
#   65 billion/cm²/second from the Sun.
#   Cosmic Neutrino Background: 330/cm³.
#
# Layer 22: Gravitational Waves
#   LIGO 2015. Frequency: 10^-9 Hz to 10^3 Hz.
#   gwrs 0.1.3 reads data.
#
# Layer 23: Cosmic Microwave Background
#   2.72548 ± 0.00057 K. Planck 2018. HEALPix. ~5 MB.
#
# Layer 24: Dark Energy
#   70% of total energy.

# ===========================================================================
# NEW PHYSICAL LAYERS (25-29)
# ===========================================================================
#
# Layer 25: Schumann Resonances
#   Standing EM waves in Earth-ionosphere cavity.
#   Base: 7.83 Hz. Harmonics: ~14, 20, 26, 33 Hz.
#   Driven by global lightning (~2000 storms).
#   GPU: sin(2π·7.83·t). < 0.001 ms.
#   Source: WWLLN, geomagnetic observatories.
#
# Layer 26: Sprites, Jets, ELVES (TLEs)
#   Transient Luminous Events above thunderstorms.
#   Red Sprites: 40-90 km. Blue Jets: up to 80 km.
#   ELVES: expanding rings at ~100 km.
#   GPU: < 0.01 ms (conditional particle effect).
#   Source: ISS-LIS, ground-based sprite networks.
#
# Layer 27: SOFAR Channel
#   700-1000 m depth. Sound speed minimum.
#   Sound travels thousands of km with minimal loss.
#   GPU: Snell's law refraction on vector. < 0.05 ms.
#   Source: NOAA Ocean Acoustics, WOA CTDT profiles.
#
# Layer 28: Global Electric Circuit
#   Ionosphere: +300,000 V. Ground: negative.
#   Fair-weather current: 1-4 picoamperes/m².
#   ~2000 thunderstorms act as chargers.
#   GPU: gradient field. < 0.01 ms.
#   Source: GEC models, NASA GEOS aerosol data.
#
# Layer 29: Diel Vertical Migration
#   Largest synchronized biomass movement on Earth.
#   Billions of organisms rise to surface at sunset,
#   sink at sunrise.
#   GPU: sinusoidal Z-shift coupled to sun altitude. < 0.05 ms.
#   Source: active acoustics (sonar), satellite altimetry.

# ===========================================================================
# BIOLOGICAL PERCEPTION LAYERS (30-37)
# ===========================================================================
#
# Layer 30: Magnetic-Visual
#   Migratory birds see the magnetic field via
#   cryptochrome radical-pair mechanism in retina.
#   Cry4a expressed highest during migration.
#   Ritz (2004): RF interference at radical-pair
#   frequency disrupts orientation.
#   Source: IGRF-13 + cryptochrome sensitivity model.
#
# Layer 31: Electric
#   Sharks sense weak electric fields from every
#   muscle contraction via ampullae of Lorenzini.
#   Source: bioelectric potentials.
#
# Layer 32: Infrared
#   Pit vipers have infrared cameras in facial pits.
#   They see heat as overlay in total darkness.
#   Source: MODIS LST + animal metabolism model.
#
# Layer 33: Echolocational
#   Bats construct space through echo timing.
#   They hear density, texture, distance.
#   Source: sonar geometry.
#
# Layer 34: Cetacean Acoustic
#   Whales sing across ocean basins via SOFAR channel.
#   Source: SOFAR channel + hydrophone.
#
# Layer 35: Mycorrhizal
#   Mycorrhizal fungi connect 90% of land plants.
#   Trade carbon for phosphorus/nitrogen.
#   Warning signals propagate through network.
#   Simard (1997): radioactive carbon isotope tracing.
#   Source: NDVI × USGS soil × SMAP moisture.
#
# Layer 36: Chemical (VOC)
#   Plants emit volatile organic compounds.
#   Acacia warns neighbours of giraffe browsing.
#   Neighbours pump tannins in response.
#   Source: atmospheric trace gases.
#
# Layer 37: Root Acoustic
#   Roots grow toward flowing water (200-1000 Hz).
#   Plants distinguish caterpillar chewing from wind.
#   Gagliano et al. (2017).
#   Source: groundwater flow models.

# ===========================================================================
# FIELD EQUATIONS
# ===========================================================================
#
# Equation 1: Sign Resonance
#   Z(λ, t) = Σ_k  A_k · vonMises(λ; μ_k, κ_k)
#   σ ≈ 12°.
#
# Equation 2: Aspect Resonance
#   R_ij(Δλ, t) = Σ_a  w_a · vonMises(Δλ; α_a, κ_a)
#   σ_a ≈ 6° for fast planets, 10° for slow.
#
# Equation 3: Location Resonance (ACG)
#   E(lat, lon, t) = Σ_p Σ_m A_pm · exp(-d_pm²/(2σ_p²))
#   Jupiter σ ≈ 500 km. Mercury σ ≈ 150 km.
#
# Equation 4: Houses as Gradients
#   Bell curves centred on house midpoints.
#   Overlapping at cusps.
#
# Equation 5: Dignities as Spectrum
#   Continuous dignity function.
#   Maximum at exaltation. Minimum at fall.
#
# Total Energy:
#   Ω(lat, lon, t) = E(lat, lon, t) · Z(λ(t), t)
#                   · R(Δλ(t), t) · Φ_earth · Φ_cosmos
#
# With Sensorium:
#   Ω(lat, lon, t, sensorium) = Ω(lat, lon, t)
#                               × Transfer(sensorium)
#   where Transfer applies coupling weights to each layer.

# ===========================================================================
# RESONANCE
# ===========================================================================
#
# R(total) = R(user) · R(moment) · R(place)
#          · R(cosmos) · R(swarm)

# ===========================================================================
# ATTENTION
# ===========================================================================
#
# attention: f64  // 0.0 = diffuse, 1.0 = sharp
#
# fn render(jd: f64, lat: f64, lon: f64,
#           attention: f64) -> Mesh {
#     let energy = compute(jd, lat, lon);
#     let sigma = base_sigma * (1.0 - attention * 0.9);
#     gaussian_mesh(lat, lon, sigma, energy)
# }

# ===========================================================================
# ANTICIPATION STATE
# ===========================================================================
#
# struct AnticipationState {
#     timescale: f64,
#     sensitivity: f64,
#     depth: f64,
#     resonance: f64,
#     drag_speed_avg: f64,
#     click_interval_avg: f64,
#     precision_avg: f64,
# }

# ===========================================================================
# TEMPORAL ARCHITECTURE
# ===========================================================================
#
# Mode 1: Move bodies → jd emerges
#   Drag Earth to rotate   = days
#   Drag Moon along orbit  = ~1 month per cycle
#   Drag Earth along orbit = ~1 year per revolution
#   Drag Jupiter           = ~12 years per revolution
#   Drag Saturn            = ~30 years per revolution
#
# Mode 2: Move single body → inverse ephemeris
#   Newton-Raphson: JD = f⁻¹(λ_target, body)
#   3-4 iterations to convergence.

# ===========================================================================
# SUPERPOSITION
# ===========================================================================
#
# Unlimited coordinates. Each evaluates the field.
# Ψ_total(x, y, t) = Σ_i  Ψ_i(x, y, t)
#
# Transit:   Birth + transit evaluation. Interference.
# Relocation: Clone and drag to new location.
# Synastry:  Evaluation A + Evaluation B.

# ===========================================================================
# RELATIVITY
# ===========================================================================
#
# Two times:
#   jd_user  = Proper Time (user)
#   jd_earth = Coordinate time + light travel time
#
# fn observed_earth_jd(user_jd: f64,
#                      user_position: Vec3) -> f64 {
#     let earth_position = Vec3::zero();
#     let distance_ly = (user_position
#         - earth_position).length() / LIGHT_YEAR;
#     user_jd - distance_ly.to_days()
# }
#
# Doppler:
#   At 50% c receding: gold → red.
#   At 50% c approaching: gold → blue.

# ===========================================================================
# GRAVITATIONAL FIELD
# ===========================================================================
#
# g = Σ_i  -G·M_i / r_i² · r̂_i
#
# 2M pixels × 10 bodies = 20M additions = ~0.2 ms.
#
# Barycentre: Sun and Jupiter orbit common centre of mass.
#   Barycentre lies OUTSIDE Sun's surface.
#
# Lagrange Points L1-L5: where forces cancel.
#   James Webb at L2. Trojans at L4/L5.
#
# Roche Limit: where tidal force overcomes self-gravity.
#   Saturn's rings = graveyard of moons.
#
# Interplanetary Threads: Jupiter's gravity reaches Earth.
#   Aspects are the geometry of gravitational fields.
#   Trine (120°) = saddle point. Square (90°) = tearing gradient.

# ===========================================================================
# DEEP TIME
# ===========================================================================
#
# Past:
#   750 Ma    Rodinia          PALEOMAP (Scotese)
#   300 Ma    Pangaea forms    GPlates (Univ. Sydney)
#   200 Ma    Pangaea breaks   GPlates
#   66 Ma     Chicxulub        GPlates + crater data
#   20 ka     Last ice age     ICE-6G_C (Peltier)
#   Today     SRTM + bathymetry Embedded 90m / 1km
#
# Solar Evolution:
#   +1 Gyr    Sun 10% brighter   Oceans evaporate
#   +2 Gyr    Sun 20% brighter   Runaway greenhouse
#   +5 Gyr    Red giant           Earth swallowed
#
# Plate shader:
#   vec3 rotate_plate(vec3 pos, int plate_id, float jd) {
#       Rotation r = get_plate_rotation(plate_id, jd);
#       return rotate_around_axis(pos, r.pole, r.angle);
#   }

# ===========================================================================
# COSMIC EPOCHS
# ===========================================================================
#
# JD collapses at cosmic scales. New time coordinate:
# CosmicEpoch (Gyr since Big Bang, t=0).
# Now: t ≈ 13.787 Gyr.
#
# Epoch 1: Human Era (±100k years)
#   Engine: JPL DE440, Gaia DR3, GPlates
#
# Epoch 2: Galactic Era (±1 Gyr)
#   Engine: statistical populations
#
# Epoch 3: Cosmic Dawn (1-13 Gyr ago)
#   Engine: ΛCDM, IllustrisTNG
#
# Epoch 4: Recombination (13.7 Gyr ago)
#   Engine: Planck CMB data
#
# Epoch 5: Heat Death (>1 trillion years)
#   Engine: thermodynamics

# ===========================================================================
# PALEOCLIMATE DATA
# ===========================================================================
#
# Era                         Source                Resolution
# ─────────────────────────── ────────────────────── ────────────
# Last 100 years              ERA5 Reanalysis       Hourly, 30km
# Last 200 years              NOAA 20th Century     6h, 200km
# Last 2,000 years            Paleo reconstructions Decadal/yr
# Last 20,000 years           PMIP4                 Centennial
# Last 100,000 years          Ice age models        Millennial
# Last 1 million years        Milanković cycles     Millennial
# Last 100 million years      Geological models     Multi-million

# ===========================================================================
# COMPUTABILITY MAP
# ===========================================================================
#
# Exactly computable:
#   Planets (-13000 to +17000):
#     Error < 1 arcsec. GPU < 0.5 ms. via anise.
#   Stars (±100k years):
#     Error < 1°. GPU < 0.5 ms. via celestial-catalog.
#   Time dilation (γ):
#     Exact. GPU < 0.01 ms.
#   Doppler (1+z):
#     Exact. GPU < 0.01 ms.
#   Light travel time (d/c):
#     Exact. GPU < 0.01 ms.
#   Plate rotations:
#     Error < 100 km at 200 Ma. GPU < 0.1 ms.
#
# Approximately computable:
#   Paleoclimate (±2°C)
#   Magnetic field reversals (unpredictable)
#   Stellar dynamics >1 Myr (chaotic)
#
# Not computable:
#   Exact weather 10,000 years ago.
#   Exact star positions >1 Gyr ago.
#   Future of humanity.

# ===========================================================================
# FRAME BUDGET
# ===========================================================================
#
# 60 FPS = 16.67 ms per frame.
#
# Task                           Thread        Time
# ────────────────────────────── ───────────── ───────
# Ephemeris: 10 planets + Moon   WASM (CPU)    ~0.5 ms
# ACG corridor computation       WASM (CPU)    ~0.1 ms
# Uniform buffer update          WASM → GPU    ~0.01 ms
# Vertex shader: 80K + SRTM      GPU           ~0.1 ms
# Fragment: Airglow + Aurora     GPU           ~0.3 ms
# Fragment: ACG corridors        GPU           ~0.05 ms
# Fragment: 37 energy layers     GPU           ~1.2 ms
# Audio synthesis (fundsp)       Audio thread  ~0.2 ms
# ────────────────────────────── ───────────── ───────
# Total                                        ~2.46 ms
# Headroom: 14.21 ms (85.2%)

# ===========================================================================
# THREAD ARCHITECTURE
# ===========================================================================
#
# Main Thread:   Input → Ephemeris → GPU Render → 60 FPS
# Audio Thread:  fundsp → 44100 Hz
# Haptic Thread: Tides + Cosmic radiation → Low-latency

# ===========================================================================
# AUDIO ARCHITECTURE
# ===========================================================================
#
# fundsp 0.23. Separate thread. 44100 Hz.
# All synthesis real-time. Pure Rust. no_std. SIMD.
#
# Bass:     Seismics (53 Hz), Tides (breath),
#           21-cm hydrogen (42 Hz)
# Mid:      Airglow (overtone), Spiral arms (4 voices),
#           Ocean currents (pan noise)
# High:     Aurora (choir), Ionosphere (crackle),
#           CMB (primordial noise)
# Percussion: Cosmic radiation (clicks), GRBs (explosion),
#             CMEs (pressure wave)
# Effects:  Gravitational waves (chirp),
#           Dark energy (glissando), Neutrinos (silence)

# ===========================================================================
# PROCEDURAL EARTH
# ===========================================================================
#
# No tiles. No MapLibre. No Deck.gl. No tile server.
# Earth is a procedural WGS84 ellipsoid. ~80,000 vertices.
# Level-7 icosphere subdivision. SRTM3 elevation as vertex
# displacement bump-map. Ray-marched atmosphere with
# Rayleigh and Mie scattering.
#
# Embedded data (~56 MB):
#   SRTM3 elevations       ~50 MB
#   IGRF-13 coefficients   ~100 KB
#   Coastlines (Nat. Earth) ~5 MB
#   Cities (GeoNames 1000)  <1 MB

# ===========================================================================
# DATA SOURCES
# ===========================================================================
#
# What                       Source             Size
# ────────────────────────── ────────────────── ───────
# Planetary positions        JPL DE440 (anise)   ~120 MB
# CMB                        Planck 2018 HEALPix ~50 MB
# Star catalogue             Gaia DR3            ~500 MB
# Paleoclimate (200 yr)      ERA5 Reanalysis     ~200 MB
# Galactic model             Vallée 2008         ~1 KB
# Cosmological params        Planck 2018 ΛCDM    ~10 KB
# Plate rotations            GPlates / PALEOMAP  ~50 MB
# Paleo-coastlines           PALEOMAP            ~20 MB
# Paleo-topography           GPlates raster      ~100 MB
# Ice-age topography         ICE-6G_C            ~50 MB
# SRTM3 elevations           Embedded            ~50 MB
# IGRF-13 coefficients       Embedded            ~100 KB
# Coastlines                 Natural Earth       ~5 MB
# Cities                     GeoNames top 1000   <1 MB
#
# Tier 1: Live               ~180 MB
# Tier 2: Deep Time          ~500 MB
# Tier 3: Full Cosmos        ~1 GB

# ===========================================================================
# DISPLACEMENT
# ===========================================================================
#
# When coordinates move through fields, the fields shift.
#
# Earth (close):       15 px displacement, 1.5 s return
# Solar system:        10 px, 2.5 s return
# Galactic:             5 px, 4.0 s return
# Cosmic:               2 px, 6.0 s return
#
# Stardust:  sin(dist * 0.1 - time * 2.0) * exp(-dist * 0.01)
#            * exp(-time * 0.5)
# Aurora:    radial wave propagation
# Airglow:   brighter where cursor traces

# ===========================================================================
# RENDERING BEHAVIOUR
# ===========================================================================
#
# Dwell > 3 s:   rendering grows calmer
# Dwell > 10 s:  rendering grows clearer
# Dwell > 30 s:  rendering radiates
# Click:          pressure wave. Radial expansion, decaying.
#
# Render Properties:
#   Form:   time (aspect quality). Round = calm. Pointed = approaching.
#   Colour: place (ACG corridors). Amber = Jupiter. Peach = Venus.
#           Rust = Mars. Indigo = Saturn. Cyan = Uranus. etc.
#   Rhythm: time scale. 0.2 Hz = deep time. 2+ Hz = Moon/daily.
#   Size:   energy density.
#   Warmth: corridor proximity.
#
# Context-Dependent Appearance:
#   Earth surface:    Warm, amber/gold. Radius 50-80 px.
#   Atmosphere:       Soft, diffuse. Radius 80-120 px.
#   Solar system:     Cool, white/blue. Radius 30-50 px.
#   Galactic:         Barely visible. Radius 20-30 px.
#
# Speed-Dependent:
#   Still:    Round halo, gently pulsing.
#   Slow:     Halo elongates toward motion.
#   Fast:     Comet trail.
#   Very fast: Shooting-star wake.

# ===========================================================================
# AUGMENTED REALITY
# ===========================================================================
#
# Camera          → background texture
# Gyroscope       → camera direction
# Accelerometer   → movement
# Magnetometer    → compass
# GPS             → lat/lon
# LiDAR (Pro)     → room depth
