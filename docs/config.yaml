%YAML 1.1
---
name: Nebra APPEAL Config
version: 7.0.1
schema: v1

# ===========================================================================
# YAML ANCHORS — Dual Endpoint (Lite Plan)
# ===========================================================================
z_api_coding: &z_api_coding
  provider: openai
  apiBase: https://api.z.ai/api/coding/paas/v4
  apiKey: ${Z_AI_API_KEY}

z_api_general: &z_api_general
  provider: openai
  apiBase: https://api.z.ai/api/paas/v4
  apiKey: ${Z_AI_API_KEY}

z_chat: &z_chat
  roles: [chat, edit, apply, summarize]

# ===========================================================================
# MODELS
# ===========================================================================
models:
  - name: "1.1 🏠 Local             │ EMBED [8K]         │ 0.0x"
    provider: ollama
    model: nomic-embed-text
    roles: [embed]

  - name: "1.2 🏠 Local             │ AUTOCOMP ⚡ [32K]  │ 0.0x"
    provider: ollama
    model: qwen2.5-coder-1.5b
    roles: [autocomplete]
    autocompleteOptions:
      debounceDelay: 300
      maxPromptTokens: 1024
    defaultCompletionOptions:
      temperature: 0.2

  - name: "2.1 🆓 GLM-4.5-Flash     │ ⚡ Chat 🔧 [200K]  │ 0.0x"
    <<: [*z_api_general, *z_chat]
    model: glm-4.5-flash
    defaultCompletionOptions:
      contextLength: 200000
      maxTokens: 4096

  - name: "2.2 🆓 GLM-4.7-Flash     │ ⚡ Chat 🔧 [200K]  │ 0.0x"
    <<: [*z_api_general, *z_chat]
    model: glm-4.7-flash
    defaultCompletionOptions:
      contextLength: 200000
      maxTokens: 4096

  - name: "2.3 🆓 GLM-4.6V-Flash    │ ⚡👁️ Vision [128K] │ 0.0x"
    <<: [*z_api_general, *z_chat]
    model: glm-4.6v-flash
    capabilities: [image_input]
    defaultCompletionOptions:
      contextLength: 128000
      maxTokens: 4096

  - name: "3.1 💲 GLM-4.5-Air       │ 🧠 Background 🔧 [200K]│0.5x"
    <<: [*z_api_coding, *z_chat]
    model: glm-4.5-air
    defaultCompletionOptions:
      contextLength: 200000
      maxTokens: 4096

  - name: "4.1 ⭐ GLM-4.7           │ 🧠 Chat ✏️ 🔧 [200K] │ 1.0x"
    <<: [*z_api_coding, *z_chat]
    model: glm-4.7
    defaultCompletionOptions:
      contextLength: 200000
      maxTokens: 8192

  - name: "5.1 🔗 GLM-5-Turbo       │ 💎🧠 Agent 🔧  [200K] │ 3.0x ⚠️"
    <<: [*z_api_coding, *z_chat]
    model: glm-5-turbo
    capabilities: [tool_use, image_input]
    defaultCompletionOptions:
      contextLength: 200000
      maxTokens: 8192
    requestOptions:
      extraBodyProperties:
        thinking:
          type: enabled
        clear_thinking: false


  - name: "5.2 🏛️ GLM-5.1           │ 💎🧠 Plan 🌐👁️🔧 [200K] │ 3.0x ⚠️"
    <<: [*z_api_coding, *z_chat]
    model: glm-5.1
    capabilities: [tool_use, image_input]
    defaultCompletionOptions:
      contextLength: 200000
      maxTokens: 16384
    requestOptions:
      extraBodyProperties:
        thinking:
          type: enabled
        clear_thinking: false

# ===========================================================================
# CONTEXT
# ===========================================================================
context:
  - provider: diff
  - provider: file
  - provider: code
  - provider: terminal

# ===========================================================================
# MCP
# ===========================================================================
mcpServers:
  - name: zai-mcp
    command: npx
    args:
      - -y
      - "@z_ai/mcp-server@latest"
    env:
      Z_AI_API_KEY: ${Z_AI_API_KEY}