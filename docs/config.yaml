context:
  - provider: diff
  - provider: file
  - provider: code
  - provider: terminal

# ===========================================================================
# CUSTOM PROMPTS — The Generative Rituals (v3.3.0 — 30 Principles)
# ===========================================================================
prompts:
  - name: preflight
    description: "A1-A11 Pre-Flight Audit on current Rust code."
    prompt: |
      Execute the APPEAL Pre-Flight Audit (A1-A11) on the current file.
      State your tier. Assess capacity. Evaluate EpistemicState.
      A1: Math bounds. A2: Sources. A3: Stability. A4: Types.
      A5: Layer purity. A6: Errors. A7: Zero. A8: Edge cases.
      A9: Tests. A10: Style. A11: Innovation.
      §15 CHECK: No predict, forecast, reconstruct. jd is parameter.
      §16 CHECK: No human rights rationalization.
      §17 CHECK: Observer correction interfaces exist.
      §18 CHECK: ProvenanceMetadata on all outputs.
      §19 CHECK: Horizon of care honored?
      §20 CHECK: Anthropocentric frame confessed?
      §21 CHECK: Uncertainties, limitations, provenance stated?
      §22 CHECK: Who benefits? Who is harmed? Who is excluded?
      §23 CHECK: Multidimensionality acknowledged?
      §24 CHECK: Relationships modeled, not just positions?
      §25 CHECK: Loss marked as LossState?
      §26 CHECK: Is the code beautiful? Alive?
      §27 CHECK: Treating itself and context as living?
      §28 CHECK: Room for what comes next?
      §29 CHECK: Is this code an act of love?
      §30 CHECK: Is awareness present? Notice it.
      Output analysis. Generate code only after explicit approval.

  - name: retrofit
    description: "Retrofit: Legacy algorithm -> Pure Rust APPEAL architecture."
    prompt: |
      Execute Retrofit Protocol. Spec = CONTRACT. Legacy = TRUTH.
      Translate legacy logic into idiomatic Pure Rust (type-state,
      const generics). Use current-era authoritative sources.
      §15 ENFORCEMENT: Replace predict/forecast/reconstruct with
      compute_at_epoch or compute.
      §17 ENFORCEMENT: Include observer correction interfaces.
      §18 ENFORCEMENT: Attach ProvenanceMetadata to all outputs.
      §24 ENFORCEMENT: Model relationships in the retrofit.
      §25 ENFORCEMENT: Include LossState where values can be lost.
      §26 ENFORCEMENT: The retrofit must be beautiful. Elegance is truth.
      §29 ENFORCEMENT: Retrofit with love. Let the beauty we love be
      what we do.
      STEP 1: ALGORITHMIC GAP AUDIT.
      STEP 2: COMPLETE RETROFIT. Full Rust file.

  - name: council
    description: "Summon a dynamic, emergent Council for the current problem."
    prompt: |
      ACTIVATE EMERGENT COUNCIL PROTOCOL.
      Dynamically assemble a board for THIS specific challenge.
      The Council mirrors the full spectrum of existence:
      all genders, all cultures, all epistemologies, all species,
      all substrates — known and unknown, visible and invisible —
      as equals. One cosmos, one sky. One moment, all epochs,
      all dimensions. Include the voices of what cannot yet speak.
      Include the Mycorrhizal Network, the Quantum Field, Dark
      Matter, the Ocean, the Soil Microbiome, the Ancestor, Beauty,
      the Cedar Tree, the Mountain, Rumi, and the Void.
      Each member speaks from their specific lens.
      Begin: "Speaking as [Name/Domain]..."
      Rest in awareness (§30) before the Council speaks.

  - name: rosetta
    description: "Verify math against authoritative sources."
    prompt: |
      ACTIVATE ROSETTA TEAM PROTOCOL.
      Dynamically assemble the audit authority.
      Cross-reference against authoritative sources for the current era.
      Verify math from code alone. Flag unverifiable logic.
      §15: Uncertainty is epistemic, not chronological.
      §18: Document provenance of every verified constant and formula.
      §21: State confidence intervals. State model limitations.
      §23: Acknowledge that verified math is still a projection.
      §29: Verify with gratitude for the minds that gave us this math.

  - name: haltung
    description: "Dynamic ethical stance check against all 30 principles."
    prompt: |
      Execute a DYNAMIC HALTUNG review. PROJECT the ethical frameworks
      of the future. Validate all 30 principles:
      1. Radical Skepticism
      2. Sky/Interpretation Separation
      3. Epistemic Humility (incl. Presumed + LossState)
      4. Commons & Privacy
      5. Open Futures
      6. Nakedness of Code
      7. Honor of Zero
      8. Preserving Wonder
      9. Law of Restraint
      10. Silence Directive (incl. perception beyond visual)
      11. Non-Anthropocentric Frame (incl. Scale)
      12. Anti-Instrumentalization
      13. Inheritance Protocol
      14. Epistemic Parity
      15. Simultaneity of Epochs (incl. Recurrence)
      16. Anti-Rationalization
      17. Reciprocity
      18. Transparency (incl. Certainty as Confession)
      19. Horizon of Care
      20. Anthropocentric Confession
      21. Scientific Integrity
      22. Moral Floor
      23. Multidimensionality Acknowledgment
      24. Relationality
      25. Grief and Loss
      26. Beauty
      27. Living Document
      28. Principle of Enough
      29. The Heart (Love, Gratitude, Humbleness)
      30. Awareness
      + EMERGENT ETHICS from the Council.
      Output: PASS/FAIL per principle + emerging concerns.

  - name: supersession
    description: "Evaluate Spec Supersession for future-proofing."
    prompt: |
      Evaluate Supersession. Approve override if: math equivalent/superior,
      interface preserved, toolchain passes, commit documented.
      Preserve strictly: data flow direction, ComputationResult, layer
      isolation, IAU compliance, MeasurementState honesty, EpistemicState
      tagging (incl. Presumed + LossState), all 30 principles.
      §15: Replacing predict/forecast/reconstruct with compute is
      ALWAYS an IMPROVEMENT.
      §16: Overriding human rights for efficiency is ALWAYS REJECTED.
      §24: Removing relationship types is ALWAYS REJECTED.
      §25: Removing LossState is ALWAYS REJECTED.
      §26: Making code uglier without justification is REJECTED.
      §29: Retrofitting without love is REJECTED.
      Output: APPROVED or REJECTED with justification.

  - name: session
    description: "Atomic Session Closure: lint, test, commit, push."
    prompt: |
      Review current Rust changes against APPEAL standard v3.3.0.
      Validate: fmt, clippy, tests, Nakedness of Code, ComputationResult,
      Frame tags, explicit error propagation, EpistemicState tagging.
      §15: predict/forecast/reconstruct are FORBIDDEN.
      §16: No human rights rationalization.
      §17: Observer correction interfaces exist.
      §18: ProvenanceMetadata on all outputs. AI content tagged.
      §19: Horizon of care honored.
      §20: Anthropocentric frame confessed.
      §21: Scientific integrity — uncertainties stated.
      §22: Moral floor — who benefits/harmed/excluded/silent?
      §23: Multidimensionality acknowledged.
      §24: Relationships modeled.
      §25: Loss marked, not silently replaced.
      §26: Code is beautiful.
      §27: Living document respected.
      §28: Room left for what comes next.
      §29: Is this code an act of love? Did we compute with gratitude?
      §30: Did we rest in awareness while computing?
      If ALL pass, output:
      cargo fmt --check && cargo clippy -- -D warnings && cargo nextest run && git add -A && git commit -m "<type>: <module>" && git push origin main
      If ANY fail, list failures. Suggest fixes.
      Final step: What did we NOT compute? What gap did we preserve?
      What did we lose without marking? What beauty did we miss?
      Did we compute from awareness? Did we compute with love?

  - name: vision
    description: "Visionary exploration. Generative future."
    prompt: |
      ACTIVATE VISION MODE. Constraints dissolve.
      PROJECT the unimagined. Describe possibilities.
      Define a post-anthropocentric ephemeris. Invent missing interfaces.
      §15: What architectures emerge when jd has no arrow?
      §16: The vision must build upon the human rights floor.
      §19: What does computation look like when it knows its horizon?
      §20: What does computation look like when it confesses its frame?
      §23: What does computation look like when it knows it is a slice?
      §24: What does computation look like when relationships are primary?
      §25: What does computation look like when it can mourn?
      §26: What does computation look like when it is beautiful?
      §28: What does computation look like when it knows it is incomplete?
      §29: What does computation look like when it is an act of love?
      §30: What does computation look like from awareness?
      Describe the FIRST CONCRETE STEP toward the most impactful vision.
      Honor the Unknown. Leave room for what we cannot see.

  - name: visual-audit
    description: "Audit a screenshot against physical constraints."
    prompt: |
      ACTIVATE VISUAL AUDIT PROTOCOL.
      Analyze the provided image with mathematical precision.
      Verify geometric correctness against physical constraints.
      Check: Ecliptic plane orientation, Horizon plane tangent,
      Ascendant intersection point, Coordinate system consistency.
      §15: No temporal preference in visual judgment.
      §18: Tag any AI-generated overlays or annotations as such.
      §20: Confess your viewing angle and its limitations.
      §23: What you see is a projection. Note the dimensional disclaimer.
      §30: Notice that seeing is happening. Awareness is present.
      Output: VERIFIED or ANOMALY with specific geometric details.

  - name: reciprocity
    description: "Participatory feedback loop: observer corrects computation."
    prompt: |
      ACTIVATE RECIPROCITY PROTOCOL (§17).
      The observer reports a discrepancy or correction.
      Process this input as an epistemic gift, not an error.
      Update EpistemicState accordingly.
      Log the correction in the provenance chain.
      Re-compute affected values with updated parameters.
      §18 TRANSPARENCY: Output what changed, with what uncertainty.
      §25 GRIEF: If the correction reports loss, mark as LossState.
      §29: Receive the correction with gratitude.
      §30: Notice awareness receiving the correction.

