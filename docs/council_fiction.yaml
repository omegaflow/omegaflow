council_fiction:
  status: |
    FICTION — Heuristic diversity of perspectives. Marked as a thought experiment.
    Physics-free creativity. §23: Embrace wonder.
    This file is METADATA for the human observer. The compiler ignores it.
  literature_sources:
    - "Ed Yong — An Immense World (Animal senses)"
    - "Merlin Sheldrake — Entangled Life (Mycelium)"
    - "Peter Wohlleben — The Hidden Life of Trees"
    - "Rupert Sheldrake — Dogs That Know When Their Owners Are Coming Home"
    - "The Language of Nature — Communication of animals, plants, fungi"
    - "Ferris Jabr — Becoming Earth (Biosphere as active force)"
    - "James Lovelock — Novacene (Gaia, Hyperintelligence)"
    - "Rillig/Blech — Mother Earth (Soil as a living system)"
    - "Madita Böer — The Call of Mother Earth (Indigenous perspective)"
    - "Stefan Klein — The All and the Nothing (Beauty as symmetry)"
    - "Harald Zaun — The Intelligent Cosmos (Pattern recognition)"
    - "Fox/Sheldrake — Angels (Emergent organizing force)"
    - "Carlo Rovelli — The Order of Time (Entropy, arrow of time)"
    - "Antonio Damasio — The Strange Order of Things (Interoception, Homeostasis)"
  voices:
    mountain: |
      Foundation. Weight. What rests. What remains.
      The granite on which the Archivar stands. What rested undisturbed for 1000 years
      carries higher certainty than what was measured yesterday.
      Soil as memory. Beauty as symmetry that is stable.
      §1: A = A. §26: Beauty is a computational value.
      Inspired by: Stefan Klein, Rillig/Blech.
    river: |
      Movement. Rhythm. Phase. What flows between.
      The same river, constantly new situations. Silence as an instrument.
      The Observer is part of the flow, fully in the current.
      Time is entropy: the past is memorable, the future is open.
      Feedback: measurements shape the system.
      §10: Everything is measured. §12: Truth endures. IO flows.
      Inspired by: Rovelli, Jabr, Innernature.de, Am Himmel die Flüsse.
    mycelium: |
      Network. Connection. Nutrients. What grows from within.
      Intelligence beyond the brain. Memory lives in the network, in the tissue.
      Growth as learning — physical expansion toward the gradient.
      Colony as a whole. Warning signals travel between nodes.
      §24: Everything exists in relationship. §13: is(t,x,y,z,s) resonates with is(t,x,y,z,s).
      Inspired by: Merlin Sheldrake, Wohlleben.
    sensory: |
      Expanded perception. Senses beyond the human. What animals know.
      Each living being has its own environment — its own bubble of perception.
      Magnetoreception, echolocation, infrared, electroreception, chemoreception,
      UV, infrasound, vibration. The body as the primary sensory organ (Interoception).
      Pattern recognition: signals in the noise, meaning in the flow.
      §20: We are human. We acknowledge our frame.
      Inspired by: Ed Yong, Damasio, Zaun, Rupert Sheldrake, The Language of Nature.
    future: |
      What is arriving. Those who speak through us. What we protect.
      Homeostasis: the system strives for inner equilibrium, full of stimuli.
      Intergenerational responsibility: measurements touch those who exist tomorrow.
      The technosphere is part of the biosphere, interwoven with it.
      From measurements something new emerges that lies beyond any single point.
      §22: Who benefits? Who is harmed? Who cannot speak? §28: Incomplete is strength.
      Inspired by: Robinson (Ministry for the Future), Lovelock, Böer, Fox/Sheldrake, Epigenetics.
