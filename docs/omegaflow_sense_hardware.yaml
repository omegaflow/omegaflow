# ============================================================
# PART 4: HARDWARE ARCHITECTURE & PIN MAP
# ============================================================

esp32_pin_map:
  i2c_bus:
    sda: "GPIO8"
    scl: "GPIO9"
    note: "TCA9548A #1 at 0x70, TCA9548A #2 at 0x71"
  i2s_audio:
    bclk: "GPIO4"
    lrck: "GPIO5"
    din: "GPIO6"
  spi_display:
    sclk: "GPIO12"
    mosi: "GPIO11"
    cs: "GPIO10"
    dc: "GPIO9"
    rst: "GPIO14"
  mosfet_bank:
    m1_led: "GPIO48"
    m2_heater: "GPIO38"
    m3_fan: "GPIO39"
    m4_peltier_in1: "GPIO40"
    m5_peltier_in2: "GPIO41"
    m6_uv_led: "GPIO47"
    m7_pump: "GPIO42"
    m8_solenoid: "GPIO21"
  servo:
    pan: "GPIO15"
    tilt: "GPIO16"

# ============================================================
# PART 5: FIRMWARE PROTOCOL & WEB SERIAL
# ============================================================

protocol:
  format: "actuate <channel> <mode> <value> <unit> <duration_ms> <t> <x> <y> <z>"
  examples:
    - "actuate light ws2812 hsv 210,255,64 - 500 1719187234.1 48.12 11.56 520"
    - "actuate heat pad pwm 0.35 - 2000 1719187236.1 48.12 11.56 520"
    - "actuate haptic erm pwm 0.80 - 120 1719187236.3 48.12 11.56 520"

  browser_integration: |
    async function actuateOmegaflowSense(channel, mode, value, unit, duration_ms) {
      const t = live['server.time'] || Date.now() / 1000;
      const x = live['geolocation.latitude'] || 0;
      const y = live['geolocation.longitude'] || 0;
      const z = live['geolocation.altitude'] || 0;
      const cmd = `actuate ${channel} ${mode} ${value} ${unit} ${duration_ms} ${t} ${x} ${y} ${z}\n`;
      const encoder = new TextEncoder();
      const writer = port.writable.getWriter();
      await writer.write(encoder.encode(cmd));
      writer.releaseLock();
    }

# ============================================================
# PART 6: SAFETY MATRIX
