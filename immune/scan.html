<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>IMMUNE SCAN</title></head>
<body style="background:#000;color:#0f0;font:14px monospace;padding:20px">
<h1>IMMUNE SCAN INITIALIZING...</h1>
<pre id="out"></pre>
<script type="module">
    import { isAntigen } from '/definitions.js';

    const out = document.getElementById('out');
    const log = (s) => {
        out.textContent += s + '\n';
        window.scrollTo(0, document.body.scrollHeight);
    };

    log('1. Patching dangerous functions...');
    const NOOP = () => {};
    const dangerous = ['alert','confirm','prompt','print','open','close','stop','focus','blur',
        'postMessage','scrollTo','scrollBy','scroll','moveTo','moveBy','resizeTo','resizeBy'];
    for (const k of dangerous) { try { window[k] = NOOP; } catch {} }
    try { window.location.assign = NOOP; } catch {}
    try { window.location.replace = NOOP; } catch {}
    window.addEventListener('beforeunload', (e) => { e.preventDefault(); e.returnValue = ''; });

    log('2. Starting blind penetration...');
    
    await new Promise(r => setTimeout(r, 50));

    const pathogens = new Set();
    const visited = new WeakSet();
    const TEST_VAL = 0.38196601125010515;

    function scan(obj, path, depth) {
        if (depth > 4 || (obj && typeof obj === 'object' && visited.has(obj))) return;
        if (obj && typeof obj === 'object') { try { visited.add(obj); } catch { return; } }

        let keys;
        try { keys = Object.getOwnPropertyNames(obj); } catch { return; }

        for (const key of keys) {
            if (['window','self','top','parent','frames','opener','frameElement',
                 '__proto__','constructor','prototype','ω'].includes(key)) continue;

            let val;
            try { val = obj[key]; } catch { 
                pathogens.add(path ? path + '.' + key : key);
                continue; 
            }
            if (val == null) continue;
            const p = path ? path + '.' + key : key;

            if (isAntigen(p, val)) {
                pathogens.add(p);
                continue;
            }

            if (typeof val === 'function') {
                try {
                    const r = val.call(obj, TEST_VAL);
                    if (r && typeof r.catch === 'function') {
                        r.catch(() => {});
                    }
                } catch (e) {
                }
            } else if (typeof val === 'object') {
                scan(val, p, depth + 1);
            }
        }
    }

    scan(window, '', 0);
    log('3. Found ' + pathogens.size + ' pathogens.');

    if (pathogens.size === 0) {
        log('ERROR: No pathogens found. Scan failed.');
    } else {
        log('4. Building payload...');
    const body = Array.from(pathogens).join('\n');
    log('Payload size: ' + body.length + ' bytes');

    log('5. Sending to server...');
    try {
        const res = await fetch('/scan', { 
            method: 'POST', 
            headers: {'Content-Type': 'text/plain'}, 
            body 
        });
        const text = await res.text();
        log('Server response: ' + text);
        log('6. Quarantine complete. Loading organism in 1s...');
        setTimeout(() => { window.location.replace('/'); }, 1000);
    } catch (e) {
        log('FETCH ERROR: ' + e.message);
    }
    }
</script>
</body>
</html>
