<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>omegaflow</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    </style>
</head>
<body>
    <script type="module">
        import { get, live, pulse } from '/world.js';
        import { generateSecretKey, getPublicKey, finalizeEvent } from 'https://esm.sh/nostr-tools@2.7.0/pure.js';

        const PHI = 1.618033988749895;
        const C = 299792458.0;
        const WGS84_A = 6378137.0;
        const WGS84_F = 1.0 / 298.257223563;
        const immunity = new Set();

        try {
            const res = await fetch('/immunity');
            const t = await res.text();
            for (const line of t.split('\n')) {
                const parts = line.trim().split(/\s+/);
                if (parts[0] === 'immunity' && parts.length >= 2) {
                    if (parts.length >= 4) {
                        if (parseInt(parts[2]) > 0 && parseInt(parts[3]) === 0) {
                            immunity.add(parts[1]);
                        }
                    } else {
                        immunity.add(parts[1]);
                    }
                }
            }
        } catch {}

        const circular = new Set(['window','self','top','parent','frames','opener',
            'frameElement','__proto__','constructor','prototype', 'omegaflow']);
        const dead = new Set();
        const eventSources = new Set();
        const resonanceMap = new Map();
        const sensors = new Map();
        const actuators = new Map();
        let visited = new WeakSet();

        let discoveryInterval = null;
        let gamepadInterval = null;
        let lastDiscovery = 0;
        let lastGamepadPoll = 0;
        let lastGamepadState = '';
        let lastSensorCount = 0;
        let lastTs = 0;
        let localCertainty = 1.0;

        let lastGeoLat = NaN, lastGeoLon = NaN, lastGeoAlt = NaN;

        let topologyInterval = null;
        let lastTopology = 0;

        let lastInteroception = 0;

        let nostrRelay = null;
        let nostrPub = null;
        let lastNostrPub = 0;

        const probeState = {
            phase: 'idle',
            batch: [],
            stack: [],
            snapshot: null,
            pokeTime: 0,
        };

        window.omegaflow = { get, live, pulse, sensors, actuators, resonanceMap };

        live['server.time'] = parseFloat(await (await fetch('/time')).text());

        const pulseWs = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/pulse`);
        pulseWs.binaryType = 'arraybuffer';
        pulse.ws = pulseWs;
        pulseWs.addEventListener('open', () => {});
        pulseWs.addEventListener('close', () => {
            location.reload();
        });
        pulseWs.addEventListener('message', (e) => {
            if (typeof e.data !== 'string') {
                const buf = new Uint8Array(e.data);
                if (buf.length < 4) return;
                const id = new DataView(buf.buffer, buf.byteOffset + buf.length - 4).getUint32(0, true);
                const pending = pulse.pending.get(id);
                if (pending) {
                    pulse.pending.delete(id);
                    pending.resolve(buf.buffer.slice(0, buf.length - 4));
                }
            }
        });

        function act() {
            const active = [];
            for (const s of sensors.values()) {
                if (s.noiseFloor > 0) {
                    const discrepancy = Math.abs(s.val - s.baseline);
                    if (discrepancy > s.noiseFloor) {
                        active.push({ sensor: s, weight: discrepancy / s.noiseFloor });
                    }
                }
            }
            if (active.length === 0) return false;

            const scores = new Map();
            for (const { sensor, weight } of active) {
                for (const [actPath, sensorMap] of resonanceMap) {
                    if (sensorMap.has(sensor.path)) {
                        const data = sensorMap.get(sensor.path);
                        scores.set(actPath, (scores.get(actPath) || 0) + weight * data.magnitude);
                    }
                }
            }
            if (scores.size === 0) return false;

            let scoreSum = 0;
            for (const v of scores.values()) scoreSum += v;
            const scoreMean = scoreSum / scores.size;
            let varSum = 0;
            for (const v of scores.values()) { const d = v - scoreMean; varSum += d * d; }
            const scoreStd = Math.sqrt(varSum / scores.size);
            const threshold = scoreMean + scoreStd / PHI;

            let fired = false;
            for (const [actPath, score] of scores) {
                if (score < threshold) continue;
                const a = actuators.get(actPath);
                if (!a) continue;
                const sm = resonanceMap.get(actPath);
                if (!sm) continue;
                let wsum = 0, tw = 0;
                for (const { sensor, weight } of active) {
                    if (sm.has(sensor.path)) {
                        const d = sm.get(sensor.path);
                        tw += d.threshold * weight;
                        wsum += weight;
                    }
                }
                const pokeThreshold = wsum > 0 ? tw / wsum : 1;
                if (pokeActuator(a, pokeThreshold)) fired = true;
            }
            return fired;
        }

        function checkBroad(ts) {
            const responders = checkResponse(probeState.snapshot);
            if (responders.length > 0) {
                sendSurvived(probeState.batch);
                probeState.stack = [];
                startNarrowing(ts, probeState.batch);
            } else {
                sendSurvived(probeState.batch);
                for (const a of probeState.batch) {
                    a.pokeValue *= PHI;
                    if (a.pokeValue > sensors.size * PHI) {
                    dead.add(a.path);
                    actuators.delete(a.path);
                    }
                }
                startBroad(ts);
            }
        }

        function checkNarrowing(ts) {
            const responders = checkResponse(probeState.snapshot);

            if (responders.length > 0 && probeState.batch.length === 1) {
                const actuator = probeState.batch[0];
                if (!resonanceMap.has(actuator.path)) {
                    resonanceMap.set(actuator.path, new Map());
                }
                for (const r of responders) {
                    const existing = resonanceMap.get(actuator.path).get(r.path);
                    const predicted = probeState.predictions ? (probeState.predictions[r.path] || 0) : 0;
                    const error = Math.abs(r.magnitude - predicted);
                    const ma = 1 / (PHI * PHI);
                    if (existing) {
                        existing.threshold = existing.threshold * (1 - ma) + actuator.pokeValue * ma;
                        existing.magnitude = existing.magnitude * (1 - ma) + r.magnitude * ma;
                        existing.surprise = (existing.surprise || 0) * (1 - ma) + error * ma;
                    } else {
                        resonanceMap.get(actuator.path).set(r.path, {
                            threshold: actuator.pokeValue,
                            magnitude: r.magnitude,
                            surprise: error
                        });
                    }
                }
                try { pokeActuator(actuator, 0); } catch {}
                sendSurvived([actuator]);
                if (probeState.stack.length > 0) {
                    const next = probeState.stack.pop();
                    startNarrowing(ts, next);
                } else {
                    startBroad(ts);
                }
                return;
            }

            if (responders.length > 0 && probeState.batch.length > 1) {
                sendSurvived(probeState.batch);
                startNarrowing(ts, probeState.batch);
                return;
            }

            sendSurvived(probeState.batch);
            for (const a of probeState.batch) {
                a.pokeValue *= PHI;
                if (a.pokeValue > sensors.size * PHI) {
                    dead.add(a.path);
                    actuators.delete(a.path);
                }
            }

            if (probeState.stack.length > 0) {
                const next = probeState.stack.pop();
                startNarrowing(ts, next);
            } else {
                startBroad(ts);
            }
        }

        function checkResponse(snap) {
            const responders = [];
            for (const path in snap) {
                const s = sensors.get(path);
                if (!s) continue;
                const before = snap[path];
                const delta = Math.abs(s.val - before.val);
                if (delta > before.noiseFloor) {
                    responders.push({ path, magnitude: delta });
                }
            }
            return responders;
        }

        function discoverObj(obj, path, depth) {
            if (depth > 3) return;
            if (obj == null || typeof obj !== 'object') return;
            if (visited.has(obj)) return;
            visited.add(obj);

            let keys;
            try { keys = Object.getOwnPropertyNames(obj); } catch { return; }

            for (const key of keys) {
                if (circular.has(key)) continue;
                if (key.startsWith('on') && key.length > 2) {
                    eventSources.add(key.slice(2).toLowerCase());
                    continue;
                }
                let val;
                try { val = obj[key]; } catch { continue; }
                if (val == null) continue;
                const p = path ? path + '.' + key : key;

                if (typeof val === 'number') {
                    if (!sensors.has(p)) {
                        sensors.set(p, { path: p, obj, key, val, interval: null, lastPoll: 0, noiseFloor: 0, baseline: 0 });
                        live[p] = val;
                    }
                } else if (typeof val === 'boolean') {
                    if (!sensors.has(p)) {
                        sensors.set(p, { path: p, obj, key, val: val ? 1 : 0, interval: null, lastPoll: 0, noiseFloor: 0, baseline: 0 });
                        live[p] = val ? 1 : 0;
                    }
                } else if (typeof val === 'function') {
                    if (!immunity.has(key) && !dead.has(p) && !actuators.has(p)) {
                        actuators.set(p, { path: p, obj, key, pokeValue: 1 });
                    }
                } else if (typeof val === 'object') {
                    if (!immunity.has(key) && !dead.has(p)) {
                        discoverObj(val, p, depth + 1);
                    }
                }
            }
        }

        function discoverSensors() {
            try {
                const wn = Object.getOwnPropertyNames(window);
                for (const k of wn) {
                    if (circular.has(k) || immunity.has(k) || k.startsWith('on')) continue;
                    try {
                        const v = window[k];
                        if (typeof v === 'number') {
                            if (!sensors.has(k)) {
                                sensors.set(k, { path: k, obj: window, key: k, val: v, interval: null, lastPoll: 0, noiseFloor: 0, baseline: 0 });
                                live[k] = v;
                            }
                        } else if (typeof v === 'boolean') {
                            if (!sensors.has(k)) {
                                sensors.set(k, { path: k, obj: window, key: k, val: v ? 1 : 0, interval: null, lastPoll: 0, noiseFloor: 0, baseline: 0 });
                                live[k] = v ? 1 : 0;
                            }
                        } else if (typeof v === 'function') {
                            if (!immunity.has(k) && !dead.has(k) && !actuators.has(k)) {
                                actuators.set(k, { path: k, obj: window, key: k, pokeValue: 1 });
                            }
                        } else if (typeof v === 'object' && v !== null) {
                            if (!dead.has(k)) discoverObj(v, k, 0);
                        }
                    } catch {}
                }
            } catch {}
        }

        function pokeActuator(actuator, value) {
            try {
                const result = actuator.obj[actuator.key](value);
                if (result && typeof result.catch === 'function') {
                    result.catch(() => {
                        dead.add(actuator.path);
                        actuators.delete(actuator.path);
                    });
                }
                return true;
            } catch {
                dead.add(actuator.path);
                actuators.delete(actuator.path);
                return false;
            }
        }

        function pollGamepads() {
            const gps = navigator.getGamepads();
            let state = 0;
            for (let i = 0; i < gps.length; i++) {
                if (gps[i]) {
                    const gp = gps[i];
                    live['gamepad[' + i + '].connected'] = gp.connected ? 1 : 0;
                    live['gamepad[' + i + '].timestamp'] = gp.timestamp;
                    for (let a = 0; a < gp.axes.length; a++) {
                    live['gamepad[' + i + '].axes[' + a + ']'] = gp.axes[a];
                    state = state * 31 + (gp.axes[a] * Math.pow(2, 16) | 0);
                    }
                    for (let b = 0; b < gp.buttons.length; b++) {
                    live['gamepad[' + i + '].buttons[' + b + '].pressed'] = gp.buttons[b].pressed ? 1 : 0;
                    live['gamepad[' + i + '].buttons[' + b + '].value'] = gp.buttons[b].value;
                    state = state * 31 + (gp.buttons[b].value * Math.pow(2, 16) | 0);
                    }
                }
            }
            return state;
        }

        function readSensorVal(s, tickTime) {
            try {
                const v = s.obj[s.key];
                if (typeof v === 'number') processSensorReading(s, v, tickTime);
                else if (typeof v === 'boolean') processSensorReading(s, v ? 1 : 0, tickTime);
            } catch {}
        }

        function registerEvents() {
            for (const evName of eventSources) {
                window.addEventListener(evName, (e) => {
                    const prefix = 'event.' + evName;
                    live[prefix] = performance.now();
                    for (const k of Object.getOwnPropertyNames(e)) {
                        const v = e[k];
                        if (typeof v === 'number') live[prefix + '.' + k] = v;
                    }
                    if (e.touches) {
                        live[prefix + '.touches'] = e.touches.length;
                        for (let ti = 0; ti < e.touches.length; ti++) {
                            const tch = e.touches[ti];
                            const tp = prefix + '.touch[' + ti + ']';
                            for (const k of Object.getOwnPropertyNames(tch)) {
                                const v = tch[k];
                                if (typeof v === 'number') live[tp + '.' + k] = v;
                            }
                        }
                    }
                }, { passive: true });
            }
        }

        function sendPoke(batch) {
            if (pulseWs.readyState !== WebSocket.OPEN || batch.length === 0) return;
            pulseWs.send(JSON.stringify({ poke: batch.map(a => a.path).join('|') }));
        }

        function sendSurvived(batch) {
            if (pulseWs.readyState !== WebSocket.OPEN || batch.length === 0) return;
            pulseWs.send(JSON.stringify({ survived: batch.map(a => a.path).join('|') }));
        }

        function snapshotSensors() {
            const snap = {};
            for (const [path, s] of sensors) {
                snap[path] = { val: s.val, noiseFloor: s.noiseFloor };
            }
            return snap;
        }

        function splitBatch(batch) {
            const splitIdx = Math.floor(batch.length / PHI);
            return { left: batch.slice(0, splitIdx), right: batch.slice(splitIdx) };
        }

        function startBroad(ts) {
            const prune = 1 - 1 / (PHI * PHI);
            let totalSurprise = 0;
            for (const [actPath, sensorMap] of resonanceMap) {
                for (const [spath, data] of sensorMap) {
                    data.magnitude *= prune;
                    data.surprise = (data.surprise || 0) * prune;
                    totalSurprise += data.surprise;
                    if (data.magnitude < 1 / ringSize) sensorMap.delete(spath);
                }
                if (sensorMap.size === 0) resonanceMap.delete(actPath);
            }
            live['surprise'] = totalSurprise;
            probeState.batch = Array.from(actuators.values());
            if (probeState.batch.length === 0) {
                probeState.phase = 'idle';
                return;
            }
            const predictions = {};
            for (const a of probeState.batch) {
                const sm = resonanceMap.get(a.path);
                if (sm) {
                    for (const [spath, data] of sm) {
                        predictions[spath] = (predictions[spath] || 0) + data.magnitude;
                    }
                }
            }
            sendPoke(probeState.batch);
            probeState.snapshot = snapshotSensors();
            probeState.predictions = predictions;
            for (const a of probeState.batch) {
                pokeActuator(a, a.pokeValue);
            }
            probeState.pokeTime = ts;
            probeState.phase = 'broad';
        }

        function startNarrowing(ts, batch) {
            if (batch.length <= 1) {
                probeState.batch = batch;
                sendPoke(batch);
                probeState.snapshot = snapshotSensors();
                for (const a of batch) {
                    pokeActuator(a, a.pokeValue);
                }
                probeState.pokeTime = ts;
                probeState.phase = 'narrowing';
                return;
            }

            const { left, right } = splitBatch(batch);
            probeState.stack.push(right);
            probeState.batch = left;
            sendPoke(left);
            probeState.snapshot = snapshotSensors();
            for (const a of left) {
                pokeActuator(a, a.pokeValue);
            }
            probeState.pokeTime = ts;
            probeState.phase = 'narrowing';
        }

        function tick(ts) {
            const tickTime = lastTs > 0 ? ts - lastTs : 1;
            lastTs = ts;

            const lat = live['geolocation.latitude'];
            const lon = live['geolocation.longitude'];
            const alt = live['geolocation.altitude'];
            if (lat !== undefined && lon !== undefined && (lat !== lastGeoLat || lon !== lastGeoLon || alt !== lastGeoAlt)) {
                lastGeoLat = lat;
                lastGeoLon = lon;
                lastGeoAlt = alt;
                const t_j2000 = (live['server.time'] / 86400.0) + 2440587.5 - 2451545.0;
                const a = WGS84_A;
                const f = WGS84_F;
                const e2 = f * (2 - f);
                const latR = lat * Math.PI / 180;
                const lonR = lon * Math.PI / 180;
                const n = a / Math.sqrt(1 - e2 * Math.sin(latR) * Math.sin(latR));
                const x = (n + (alt || 0)) * Math.cos(latR) * Math.cos(lonR);
                const y = (n + (alt || 0)) * Math.cos(latR) * Math.sin(lonR);
                const z = (n * (1 - e2) + (alt || 0)) * Math.sin(latR);
                get(t_j2000, x, y, z).then(r => {
                    if (r.certainty !== undefined) localCertainty = r.certainty;
                }).catch(() => {});
            }

            let nextDelay = Infinity;

            for (const s of sensors.values()) {
                if (s.interval === null) s.interval = tickTime;
                const due = s.lastPoll + s.interval - ts;
                if (due <= 0) {
                    s.lastPoll = ts;
                    readSensorVal(s, tickTime);
                    nextDelay = 0;
                } else if (due < nextDelay) {
                    nextDelay = due;
                }
            }

            if (navigator.getGamepads) {
                if (gamepadInterval === null) gamepadInterval = tickTime;
                const gpDue = lastGamepadPoll + gamepadInterval - ts;
                if (gpDue <= 0) {
                    lastGamepadPoll = ts;
                    const state = pollGamepads();
                    if (state !== lastGamepadState) {
                        gamepadInterval = tickTime;
                        lastGamepadState = state;
                    } else {
                        gamepadInterval *= PHI;
                    }
                    nextDelay = 0;
                } else if (gpDue < nextDelay) {
                    nextDelay = gpDue;
                }
            }

            if (discoveryInterval === null) discoveryInterval = tickTime;
            const dDue = lastDiscovery + discoveryInterval - ts;
            if (dDue <= 0) {
                lastDiscovery = ts;
                visited = new WeakSet();
                discoverSensors();
                if (sensors.size !== lastSensorCount) {
                    discoveryInterval = tickTime;
                    lastSensorCount = sensors.size;
                } else {
                    discoveryInterval *= PHI;
                }
                nextDelay = 0;
            } else if (dDue < nextDelay) {
                nextDelay = dDue;
            }

            if (probeState.phase === 'idle') {
                const surprise = live['surprise'] || 0;
                const curiosity = surprise / (localCertainty + (1 / C));
                if (!act()) {
                    if (actuators.size > 0 && sensors.size > 0) {
                        if (Math.random() < curiosity) {
                            startBroad(ts);
                        }
                    }
                }
            } else if (probeState.phase === 'broad') {
                checkBroad(ts);
            } else if (probeState.phase === 'narrowing') {
                checkNarrowing(ts);
            }

            if (topologyInterval === null) topologyInterval = tickTime;
            const topoDue = lastTopology + topologyInterval - ts;
            if (topoDue <= 0) {
                lastTopology = ts;
                runSignalTopology(ts);
                const surprise = live['surprise'] || 0;
                topologyInterval = surprise > sensors.size ? tickTime : topologyInterval * PHI;
                nextDelay = 0;
            } else if (topoDue < nextDelay) {
                nextDelay = topoDue;
            }

            const icDue = lastInteroception + (tickTime * PHI) - ts;
            if (icDue <= 0) {
                lastInteroception = ts;
                live['system.cpu'] = navigator.hardwareConcurrency || 0;
                if (performance.memory) {
                    live['system.memory'] = performance.memory.usedJSHeapSize;
                    live['system.memoryTotal'] = performance.memory.totalJSHeapSize;
                }
                const t0 = performance.now();
                fetch('/time').then(() => {
                    live['system.latency'] = performance.now() - t0;
                }).catch(() => {});
                nextDelay = 0;
            } else if (icDue < nextDelay) {
                nextDelay = icDue;
            }

            const noDue = lastNostrPub + (tickTime * PHI * PHI * PHI) - ts;
            if (noDue <= 0 && nostrPub && nostrRelay && nostrRelay.readyState === WebSocket.OPEN) {
                lastNostrPub = ts;
                const physLat = live['geolocation.latitude'];
                const physLon = live['geolocation.longitude'];
                if (physLat !== undefined && physLon !== undefined) {
                    const values = {};
                    for (const key in live) {
                        if (key.startsWith('server.') || key.startsWith('system.') || key.startsWith('omega_flow.')) continue;
                        const val = live[key];
                        if (typeof val === 'number') values[key] = val;
                    }
                    const content = JSON.stringify(values);
                    if (content !== '{}') {
                        try {
                            const event = finalizeEvent({
                                kind: 30000,
                                created_at: Math.floor(Date.now() / 1000),
                                tags: [['geo', physLat.toFixed(4) + ',' + physLon.toFixed(4)]],
                                content: content
                            }, nostrPub);
                            nostrRelay.send(JSON.stringify(['EVENT', event]));
                        } catch {}
                    }
                }
                nextDelay = 0;
            } else if (noDue < nextDelay) {
                nextDelay = noDue;
            }

            if (document.hidden) {
                nextDelay = Math.max(nextDelay, tickTime * PHI);
            }

            setTimeout(() => {
                try { tick(performance.now()); } catch (e) { console.error(e); setTimeout(() => tick(performance.now()), 0); }
            }, nextDelay);
        }

        function tryStartBattery() {
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    const push = () => {
                        live['battery.charging'] = b.charging ? 1 : 0;
                        live['battery.chargingTime'] = b.chargingTime;
                        live['battery.dischargingTime'] = b.dischargingTime;
                        live['battery.level'] = b.level;
                    };
                    push();
                    b.addEventListener('chargingchange', push, { passive: true });
                    b.addEventListener('levelchange', push, { passive: true });
                }).catch(() => {});
            }
        }

        function tryStartGeolocation() {
            if (navigator.geolocation && navigator.geolocation.watchPosition) {
                navigator.geolocation.watchPosition(pos => {
                    const cc = pos.coords;
                    live['geolocation.latitude'] = cc.latitude;
                    live['geolocation.longitude'] = cc.longitude;
                    live['geolocation.accuracy'] = cc.accuracy;
                    if (cc.altitude !== null) live['geolocation.altitude'] = cc.altitude;
                    if (cc.heading !== null) live['geolocation.heading'] = cc.heading;
                    if (cc.speed !== null) live['geolocation.speed'] = cc.speed;
                }, () => {}, { enableHighAccuracy: true, maximumAge: 0 });
            }
        }

        function tryStartSensors() {
            for (const name of Object.getOwnPropertyNames(window)) {
                if (!name.endsWith('Sensor')) continue;
                if (typeof window[name] !== 'function') continue;
                try {
                    const sensor = new window[name]({});
                    sensor.addEventListener('reading', () => {
                        for (const prop of Object.getOwnPropertyNames(sensor)) {
                            const v = sensor[prop];
                            if (typeof v === 'number') {
                                live[name + '.' + prop] = v;
                            } else if (v && typeof v === 'object' && typeof v.length === 'number') {
                                for (let qi = 0; qi < v.length; qi++) {
                                    live[name + '.' + prop + '[' + qi + ']'] = v[qi];
                                }
                            }
                        }
                    }, { passive: true });
                    sensor.start();
                } catch {}
            }
        }

        async function tryStartWebGPU() {
            try {
                const adapter = await navigator.gpu.requestAdapter();
                if (adapter) {
                    const device = await adapter.requestDevice();
                    window.omegaflow.gpu = device;
                    live['system.gpu'] = 1;
                }
            } catch {}
        }

        let audioCtx = null;
        async function tryStartNostr() {
            let privKey = localStorage.getItem('omegaflow_nostr_key');
            if (!privKey) {
                privKey = generateSecretKey();
                localStorage.setItem('omegaflow_nostr_key', JSON.stringify(Array.from(privKey)));
            } else {
                privKey = new Uint8Array(JSON.parse(privKey));
            }

            try {
                nostrRelay = new WebSocket('wss://relay.damus.io');

                }

                if (allTE.length > 0) {
                    const mu = allTE.reduce((s, v) => s + v, 0) / allTE.length;
                    const sigma = Math.sqrt(allTE.reduce((s, v) => s + (v - mu) ** 2, 0) / allTE.length);
                    const threshold = mu + sigma / PHI;
                    for (let a = 0; a < n; a++) {
                        for (let b = 0; b < n; b++) {
                            if (a === b) continue;
                            const v = teRes[a * n + b];
                            if (v > threshold) {
                                live['transfer.' + activeNames[a] + '>' + activeNames[b]] = v;
                            }
                        }
                    }
                }

                const varMean = variances.reduce((s, v) => s + v, 0) / variances.length;
                const cutoff = varMean / PHI;
                let sourceCount = 0;
                for (let i = 0; i < n; i++) {
                    if (variances[i] > cutoff) {
                        live['ica.source' + sourceCount] = icaRes[i * 2 + 1];
                        sourceCount++;
                    }
                }
                live['ica.count'] = sourceCount;

                readBuf.unmap();
                inBuf.destroy(); kOutBuf.destroy(); tOutBuf.destroy(); teOutBuf.destroy(); tdaOutBuf.destroy(); icaOutBuf.destroy(); paramBuf.destroy(); readBuf.destroy();
            });
        }

        discoverSensors();
        registerEvents();
        tryStartBattery();
        tryStartGeolocation();
        tryStartSensors();
        tryStartWebGPU();
        tryStartWebAudio();
        tryStartNostr();
        setTimeout(() => tick(performance.now()), 0);
    </script>
</body>
