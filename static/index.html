<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>omegaflow</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    </style>
</head>
<body>
    <script type="module">
        import { syncFrame, φ, transport, Φ, C, MA, WGS84_A, WGS84_F, j2000 } from '/constants.js';

        const REMOTE_PREFIX = 'omega_flow.';
        function reportState(category, detail) {
            try {
                fetch('/crash', { method: 'POST', body: `${category}: ${detail}` });
            } catch {}
        }

        const circular = new Set(['window','self','top','parent','frames','opener','frameElement','__proto__','constructor','prototype', 'ω']);
        const eventSources = new Set();
        let visited = new WeakSet();

        const oscillators = new Map();
        
        let CAPTURE_RING_SIZE = 256;
        try {
            if (navigator.deviceMemory) {
                CAPTURE_RING_SIZE = Math.min(2048, Math.max(256, navigator.deviceMemory * 256));
            }
        } catch {}
        
        let topologyRingSize = 10;
        let topologyPending = false;
        let kolmogorovPipeline = null, takensPipeline = null, tdaPipeline = null, icaPipeline = null;

        let lastDiscovery = 0, lastTs = 0, certainty = 1.0, debugEl = null, lastDebug = 0;
        let tOffset = 0, spatialOffset = { x: 0, y: 0, z: 0 };
        let tPresence = 0, spatialPresence = { x: 0, y: 0, z: 0 };
        let prevTPresence = 0, prevSpatialPresence = { x: 0, y: 0, z: 0 };
        let clarity = 1.0;
        let nostrRelay = null, nostrPub = null, nostrModule = null, lastNostrPub = 0;

        const internalMetrics = ['transfer.', 'ica.', 'takens.', 'tda.', 'complexity.', 'server.', 'system.', 'event.', REMOTE_PREFIX, 'membrane.'];

        function isInternalMetric(url) {
            for (const prefix of internalMetrics) {
                if (url.startsWith(prefix)) return true;
            }
            return false;
        }

        window.ω = { syncFrame, φ, transport, oscillators };

        φ['server.time'] = parseFloat(await (await fetch('/time')).text());

        const pulseWs = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/pulse`);
        pulseWs.binaryType = 'arraybuffer';
        transport.socket = pulseWs;
        pulseWs.addEventListener('close', () => location.reload());
        pulseWs.addEventListener('message', (e) => {
            if (typeof e.data !== 'string') {
                const buf = new Uint8Array(e.data);
                if (buf.length < 13 || buf[0] !== 0xCF || buf[1] !== 0x86 || buf[2] !== 6) return;
                const dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
                const id = dv.getUint32(3, true);
                const pending = transport.pending.get(id);
                if (pending) {
                    transport.pending.delete(id);
                    transport.rtt = transport.rtt === 0 ? (performance.now() - pending.startTime) : transport.rtt * (1 - MA) + (performance.now() - pending.startTime) * MA;
                    pending.resolve(e.data);
                }
            }
        });

        function geodeticToEcef(lat, lon, alt) {
            const a = WGS84_A, f = WGS84_F, e2 = f*(2-f);
            const latR = lat*Math.PI/180, lonR = lon*Math.PI/180;
            const n = a/Math.sqrt(1-e2*Math.sin(latR)*Math.sin(latR));
            return { x: (n+alt)*Math.cos(latR)*Math.cos(lonR), y: (n+alt)*Math.cos(latR)*Math.sin(lonR), z: (n*(1-e2)+alt)*Math.sin(latR) };
        }

        function createOscillator(url, initialVal, readFn, writeFn) {
            return {
                url, ring: new Float32Array(CAPTURE_RING_SIZE), idx: 0, filled: 0,
                read: readFn, write: writeFn, complexity: 0,
                median: initialVal, lastEcho: performance.now(), exploration: 0.0,
                lastOutTE: 0, direction: 1, ticksSinceTurn: 0, naturalLatencyTicks: 0,
                originT: 0, originPos: { x: 0, y: 0, z: 0 }, presenceWeight: 1.0,
                lastTransmitted: initialVal
            };
        }

        function scanObjectForValues(obj, path, depth) {
            if (obj == null) return;
            if (typeof obj.length === 'number' && typeof obj !== 'string') {
                for (let i = 0; i < obj.length; i++) { try { scanObjectForValues(obj[i], path + '[' + i + ']', depth + 1); } catch {} }
                return;
            }
            let keys;
            try { keys = Object.getOwnPropertyNames(obj); } catch { return; }
            for (const k of keys) {
                try {
                    const v = obj[k];
                    if (typeof v === 'number') injectEcho(path + '.' + k, v);
                    else if (typeof v === 'boolean') injectEcho(path + '.' + k, v ? 1 : 0);
                    else if (typeof v === 'object') scanObjectForValues(v, path + '.' + k, depth + 1);
                } catch {}
            }
        }

        function discoverObj(obj, path, depth) {
            if (obj == null || typeof obj !== 'object' || visited.has(obj)) return;
            visited.add(obj);
            
            if (typeof obj.addEventListener === 'function' && path) {
                try {
                    obj.addEventListener('reading', () => scanObjectForValues(obj, path, 0), { passive: true });
                    obj.addEventListener('change', () => scanObjectForValues(obj, path, 0), { passive: true });
                    obj.addEventListener('statechange', () => scanObjectForValues(obj, path, 0), { passive: true });
                } catch {}
            }

            let keys; try { keys = Object.getOwnPropertyNames(obj); } catch { return; }
            for (const key of keys) {
                if (circular.has(key)) continue;
                if (key.startsWith('on') && key.length > 2) { eventSources.add(key.slice(2).toLowerCase()); continue; }
                let val; try { val = obj[key]; } catch { continue; }
                if (val == null) continue;
                const p = path ? path + '.' + key : key;
                
                if (typeof val === 'number' || typeof val === 'boolean') {
                    if (!oscillators.has(p)) {
                        const initVal = typeof val === 'boolean' ? (val ? 1 : 0) : val;
                        oscillators.set(p, createOscillator(p, initVal, () => {
                            let v = obj[key]; return typeof v === 'boolean' ? (v ? 1 : 0) : (typeof v === 'number' ? v : null);
                        }, null));
                    }
                } else if (typeof val === 'function') {
                    if (oscillators.has(p)) continue;
                    
                    let isPureActuator = false, isConstructor = false; let isNative = false, hasContext = false, isReceptive = false;
                    try {
                        const fnStr = val.toString();
                        isNative = fnStr.includes('[native code]');
                        hasContext = p.includes('.');
                        isReceptive = val.length > 0;
                        isConstructor = key[0] === key[0].toUpperCase() && key[0] !== key[0].toLowerCase();
                        if (isNative && hasContext && isReceptive && !isConstructor) isPureActuator = true;
                    } catch {}

                    if (isPureActuator) {
                        const osc = createOscillator(p, 0, null, (v) => {
                            try {
                                const res = val.call(obj, v);
                                if (res && typeof res.then === 'function') {
                                    res.then(asyncResult => { if (asyncResult && typeof asyncResult === 'object') discoverObj(asyncResult, p + '_unveiled', 0); }).catch(() => {});
                                }
                                return res;
                            } catch (e) { 
                                reportState('HARDWARE_EXCEPTION', p + ' ' + e.message); 
                                return null; 
                            }
                        });
                        oscillators.set(p, osc);
                    } else if (isConstructor && isNative) {
                        try {
                            const instance = new val({ frequency: 60, referenceFrame: 'device' });
                            discoverObj(instance, p, 0);
                            if (typeof instance.start === 'function') instance.start();
                        } catch {}
                    }
                } else if (typeof val === 'object') {
                    discoverObj(val, p, depth + 1);
                }
            }
        }

        function registerEvents() {
            for (const evName of eventSources) {
                window.addEventListener(evName, (e) => {
                    injectEcho('event.' + evName, performance.now());
                    if (e && typeof e === 'object') scanObjectForValues(e, 'event.' + evName, 0);
                }, { passive: true });
            }
        }

        function injectEcho(url, value, t = j2000(φ['server.time'] || 0), x = spatialPresence.x, y = spatialPresence.y, z = spatialPresence.z) {
            if (typeof value !== 'number') return;
            let osc = oscillators.get(url);
            if (!osc && url.startsWith('event.')) return;
            if (!osc) { osc = createOscillator(url, value, null, null); oscillators.set(url, osc); }
            
            osc.originT = osc.originT === 0 ? t : osc.originT * (1 - MA) + t * MA;
            osc.originPos.x = osc.originPos.x * (1 - MA) + x * MA;
            osc.originPos.y = osc.originPos.y * (1 - MA) + y * MA;
            osc.originPos.z = osc.originPos.z * (1 - MA) + z * MA;
            
            osc.ring[osc.idx] = value;
            osc.idx = (osc.idx + 1) % CAPTURE_RING_SIZE;
            if (osc.filled < CAPTURE_RING_SIZE) osc.filled++;
            osc.median = osc.median * (1 - MA) + value * MA;
            osc.lastEcho = performance.now();
        }

        async function syncField(transmitList, queryPos) {
            if (transmitList.length === 0 && !queryPos) return;
            const queries = queryPos ? [{ t: tPresence, x: queryPos.x, y: queryPos.y, z: queryPos.z }] : [];
            const echoes = await syncFrame(transmitList, queries, []);
            for (const echo of echoes) { injectEcho(echo.name, echo.val, echo.t, queryPos?.x, queryPos?.y, queryPos?.z); }
        }

        function calculatePresenceWeights() {
            const g = measureG();
            const scale = 1.0 + (g * Φ);
            for (const [url, osc] of oscillators) {
                const dx = osc.originPos.x - spatialPresence.x;
                const dy = osc.originPos.y - spatialPresence.y;
                const dz = osc.originPos.z - spatialPresence.z;
                const dt = Math.abs(osc.originT - tPresence) * 86400.0 * C;
                
                const spatialDistSq = dx*dx + dy*dy + dz*dz;
                const minkowskiSq = (dt * dt) - spatialDistSq;
                
                if (minkowskiSq < 0) {
                    osc.presenceWeight = 0;
                    continue;
                }
                
                const dist4D = Math.sqrt(minkowskiSq);
                osc.presenceWeight = scale / (scale + (dist4D * dist4D));
            }
        }

        const kolmogorovShader = `let PHI = f32(1.618033988749895); @group(0) @binding(0) var<storage, read> data: array<f32>; @group(0) @binding(1) var<storage, read_write> complexity: array<f32>; @group(0) @binding(2) var<uniform> params: vec4<u32>; @compute @workgroup_size(64) fn main(@builtin(global_invocation_id) gid: vec3<u32>) { let s = gid.x; let n = u32(params.x); let rs = u32(params.y); if (s >= n) { return; } let base = s * rs; var sum: f32 = 0.0; for (var i = 0u; i < rs; i++) { sum += data[base + i]; } let mean = sum / f32(rs); var var_sum: f32 = 0.0; for (var i = 0u; i < rs; i++) { let d = data[base + i] - mean; var_sum += d * d; } let threshold = sqrt(var_sum / f32(rs)) / 2.618033988749895; var repeats: f32 = 0.0; for (var i = 0u; i < rs; i++) { let vi = data[base + i]; for (var j = i + 1u; j < rs; j++) { if (abs(vi - data[base + j]) < threshold) { repeats += 1.0; } } } let total = f32(rs * (rs - 1u) / 2u); complexity[s] = 1.0 - (repeats / total); }`;
        const takensShader = `let PHI = f32(1.618033988749895); @group(0) @binding(0) var<storage, read> data: array<f32>; @group(0) @binding(1) var<storage, read_write> out: array<f32>; @group(0) @binding(2) var<uniform> params: vec4<u32>; @compute @workgroup_size(64) fn main(@builtin(global_invocation_id) gid: vec3<u32>) { let s = gid.x; let n = u32(params.x); let rs = u32(params.y); if (s >= n) { return; } let base = s * rs; var sum: f32 = 0.0; for (var i = 0u; i < rs; i++) { sum += data[base + i]; } let mean = sum / f32(rs); var best_tau: u32 = 1u; var mi_prev: f32 = data[base]; var mi_prev2: f32 = data[base]; let max_lag = u32(f32(rs) / PHI); for (var lag = 1u; lag <= max_lag; lag++) { var mn: f32 = data[base]; var mx: f32 = data[base]; for (var i = 0u; i < rs - lag; i++) { mn = min(mn, data[base + i]); mx = max(mx, data[base + i]); } let range = mx - mn + (1.0 / 86400.0); var h00: f32 = 0.0; var h01: f32 = 0.0; var h10: f32 = 0.0; var h11: f32 = 0.0; for (var i = 0u; i < rs - lag; i++) { let b1 = select(0u, 1u, data[base + i] > mn + range * 0.5); let b2 = select(0u, 1u, data[base + i + lag] > mn + range * 0.5); if (b1 == 0u && b2 == 0u) { h00 += 1.0; } else if (b1 == 0u && b2 == 1u) { h01 += 1.0; } else if (b1 == 1u && b2 == 0u) { h10 += 1.0; } else { h11 += 1.0; } } let total = f32(rs - lag); let p0 = (h00 + h01) / total; let p1 = (h10 + h11) / total; let q0 = (h00 + h10) / total; let q1 = (h01 + h11) / total; var mi: f32 = 0.0; let eps = 1.0 / 86400.0; if (h00 > 0.0) { mi += (h00/total) * log2((h00/total) / (p0*q0 + eps) + eps); } if (h01 > 0.0) { mi += (h01/total) * log2((h01/total) / (p0*q1 + eps) + eps); } if (h10 > 0.0) { mi += (h10/total) * log2((h10/total) / (p1*q0 + eps) + eps); } if (h11 > 0.0) { mi += (h11/total) * log2((h11/total) / (p1*q1 + eps) + eps); } if (lag >= 3u && mi_prev2 > mi_prev && mi_prev <= mi) { best_tau = lag - 1u; break; } mi_prev2 = mi_prev; mi_prev = mi; } if (2u * best_tau >= rs) { best_tau = 1u; } let max_pts = rs - 2u * best_tau; let out_base = s * 4u; var cx: f32 = 0.0; var cy: f32 = 0.0; var cz: f32 = 0.0; for (var i = 0u; i < max_pts; i++) { cx += data[base + i]; cy += data[base + i + best_tau]; cz += data[base + i + 2u * best_tau]; } cx = cx / f32(max_pts); cy = cy / f32(max_pts); cz = cz / f32(max_pts); var spread: f32 = 0.0; for (var i = 0u; i < max_pts; i++) { let dx = data[base + i] - cx; let dy = data[base + i + best_tau] - cy; let dz = data[base + i + 2u * best_tau] - cz; spread += sqrt(dx*dx + dy*dy + dz*dz); } spread = spread / f32(max_pts); out[out_base] = cx; out[out_base + 1u] = cy; out[out_base + 2u] = cz; out[out_base + 3u] = spread; }`;
        const icaShader = `let PHI = f32(1.618033988749895); @group(0) @binding(0) var<storage, read> data: array<f32>; @group(0) @binding(1) var<storage, read_write> out: array<f32>; @group(0) @binding(2) var<uniform> params: vec4<u32>; @compute @workgroup_size(64) fn main(@builtin(global_invocation_id) gid: vec3<u32>) { let s = gid.x; let n = u32(params.x); let rs = u32(params.y); if (s >= n) { return; } let base = s * rs; var mean: f32 = 0.0; for (var i = 0u; i < rs; i++) { mean += data[base + i]; } mean = mean / f32(rs); var w: f32 = 1.0 / (PHI + f32(s + 1u)); for (var iter = 0u; iter < 3u; iter++) { var num: f32 = 0.0; var den: f32 = 0.0; for (var i = 0u; i < rs; i++) { let x = data[base + i] - mean; let wx = w * x; let g = tanh(wx); let gp = 1.0 - g * g; num += x * g; den += gp; } num = num / f32(rs); den = den / f32(rs); let w_new = num - den * w; w = w_new / (abs(w_new) + (1.0 / 86400.0)); } var mag: f32 = 0.0; for (var i = 0u; i < rs; i++) { let x = data[base + i] - mean; mag += abs(w * x); } out[s] = mag / f32(rs); }`;
        const tdaShader = `let PHI = f32(1.618033988749895); @group(0) @binding(0) var<storage, read> data: array<f32>; @group(0) @binding(1) var<storage, read_write> out: array<f32>; @group(0) @binding(2) var<uniform> params: vec4<u32>; @compute @workgroup_size(64) fn main(@builtin(global_invocation_id) gid: vec3<u32>) { let s = gid.x; let n = u32(params.x); let rs = u32(params.y); if (s >= n) { return; } let base = s * rs; let sub = u32(f32(rs) / 2.618033988749895); let tau = u32(1.0 + 1.0 / PHI); var dists: array<f32, 48>; for (var i = 0u; i < sub; i++) { var min_d: f32 = abs(data[base] - data[base + tau]); let p1 = base + i * tau; for (var j = 0u; j < sub; j++) { if (i == j) { continue; } let p2 = base + j * tau; let d = abs(data[p1] - data[p2]); if (d < min_d) { min_d = d; } } dists[i] = min_d; } for (var i = 1u; i < sub; i++) { let key = dists[i]; var j = i; while (j > 0u && dists[j - 1u] > key) { dists[j] = dists[j - 1u]; j = j - 1u; } dists[j] = key; } var life_sum: f32 = 0.0; var prev_d: f32 = 0.0; var comps: f32 = f32(sub); for (var i = 0u; i < sub; i++) { let d = dists[i]; life_sum += (d - prev_d) * comps; comps -= 1.0; prev_d = d; } var mean_d: f32 = 0.0; for (var i = 0u; i < sub; i++) { mean_d += dists[i]; } mean_d = mean_d / f32(sub); var betti0: f32 = 0.0; var above = false; for (var i = 0u; i < sub; i++) { if (dists[i] > mean_d && !above) { betti0 += 1.0; above = true; } else if (dists[i] <= mean_d && above) { above = false; } } let out_base = s * 2u; out[out_base] = life_sum / f32(sub); out[out_base + 1u] = betti0; }`;

        function unrollRing(ring, idx, size) {
            const unrolled = new Float32Array(size);
            for (let i = 0; i < size; i++) {
                unrolled[i] = ring[(idx + i) % ring.length];
            }
            return unrolled;
        }

        function calculateContinuousTE(sourceRing, targetRing) {
            const rs = sourceRing.length;
            if (rs < 4) return 0;

            let sum_s = 0, sum_t = 0;
            for (let i = 0; i < rs; i++) { sum_s += sourceRing[i]; sum_t += targetRing[i]; }
            const mean_s = sum_s / rs;
            const mean_t = sum_t / rs;

            let var_s = 0, var_t = 0;
            for (let i = 0; i < rs; i++) {
                var_s += (sourceRing[i] - mean_s) ** 2;
                var_t += (targetRing[i] - mean_t) ** 2;
            }
            const sigma_s = Math.max(Math.sqrt(var_s / rs), Number.EPSILON);
            const sigma_t = Math.max(Math.sqrt(var_t / rs), Number.EPSILON);
            const sigma_st = (sigma_s + sigma_t) * 0.5;

            const gauss = (d, sigma) => Math.exp(-0.5 * (d * d) / (sigma * sigma));

            let te_val = 0;
            for (let i = 0; i < rs - 1; i++) {
                const s_t = sourceRing[i];
                const t_t = targetRing[i];
                const t_t1 = targetRing[i + 1];

                let k_joint = 0, k_cond = 0, k_t = 0, k_t1 = 0;

                for (let j = 0; j < rs - 1; j++) {
                    const s_tj = sourceRing[j];
                    const t_tj = targetRing[j];
                    const t_tj1 = targetRing[j + 1];

                    k_joint += gauss(Math.sqrt((s_t - s_tj)**2 + (t_t - t_tj)**2 + (t_t1 - t_tj1)**2), sigma_st);
                    k_cond  += gauss(Math.sqrt((s_t - s_tj)**2 + (t_t - t_tj)**2), sigma_st);
                    k_t     += gauss(Math.abs(t_t - t_tj), sigma_t);
                    k_t1    += gauss(Math.sqrt((t_t - t_tj)**2 + (t_t1 - t_tj1)**2), sigma_t);
                }

                if (k_joint > 0 && k_cond > 0 && k_t > 0 && k_t1 > 0) {
                    const p_j = k_joint / rs;
                    const p_c = k_cond / rs;
                    const p_t = k_t / rs;
                    const p_t1 = k_t1 / rs;
                    te_val += p_j * Math.log2((p_j * p_t) / (p_c * p_t1) + Number.EPSILON);
                }
            }
            return Math.max(0, te_val / (rs - 1));
        }

        async function runSignalTopology() {
            if (!window.ω?.gpu || topologyPending) return;
            topologyPending = true;

            const candidates = [];
            for (const [url, osc] of oscillators) {
                if (osc.filled >= topologyRingSize && !isInternalMetric(url)) {
                    candidates.push({ url, osc: osc });
                }
            }
            if (candidates.length < 2) { topologyPending = false; return; }

            const gpu = window.ω.gpu;
            const n = candidates.length;
            const flat = new Float32Array(n * topologyRingSize);
            
            for (let i = 0; i < n; i++) {
                const osc = candidates[i].osc;
                const unrolled = unrollRing(osc.ring, osc.idx, topologyRingSize);
                flat.set(unrolled, i * topologyRingSize);
            }

            const layout = { entries: [
                { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
                { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
                { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } }
            ]};
            
            let inBuf, paramBuf, kOutBuf, tOutBuf, tdaOutBuf, icaOutBuf, readBuf;
            const evalStartTime = performance.now();
            try {
                if (!kolmogorovPipeline) {
                    const bl = gpu.createBindGroupLayout(layout);
                    const pl = gpu.createPipelineLayout({ bindGroupLayouts: [bl] });
                    kolmogorovPipeline = gpu.createComputePipeline({ layout: pl, compute: { module: gpu.createShaderModule({ code: kolmogorovShader }), entryPoint: 'main' } });
                    takensPipeline = gpu.createComputePipeline({ layout: pl, compute: { module: gpu.createShaderModule({ code: takensShader }), entryPoint: 'main' } });
                    icaPipeline = gpu.createComputePipeline({ layout: pl, compute: { module: gpu.createShaderModule({ code: icaShader }), entryPoint: 'main' } });
                    tdaPipeline = gpu.createComputePipeline({ layout: pl, compute: { module: gpu.createShaderModule({ code: tdaShader }), entryPoint: 'main' } });
                }

                inBuf = gpu.createBuffer({ size: flat.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
                gpu.queue.writeBuffer(inBuf, 0, flat);
                paramBuf = gpu.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
                gpu.queue.writeBuffer(paramBuf, 0, new Uint32Array([n, topologyRingSize, 0, 0]));

                kOutBuf = gpu.createBuffer({ size: n * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
                tOutBuf = gpu.createBuffer({ size: n * 4 * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
                tdaOutBuf = gpu.createBuffer({ size: n * 2 * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
                icaOutBuf = gpu.createBuffer({ size: n * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });

                const bl = kolmogorovPipeline.getBindGroupLayout(0);
                const kBg = gpu.createBindGroup({ layout: bl, entries: [{ binding: 0, resource: { buffer: inBuf } }, { binding: 1, resource: { buffer: kOutBuf } }, { binding: 2, resource: { buffer: paramBuf } }] });
                const tBg = gpu.createBindGroup({ layout: bl, entries: [{ binding: 0, resource: { buffer: inBuf } }, { binding: 1, resource: { buffer: tOutBuf } }, { binding: 2, resource: { buffer: paramBuf } }] });
                const tdaBg = gpu.createBindGroup({ layout: bl, entries: [{ binding: 0, resource: { buffer: inBuf } }, { binding: 1, resource: { buffer: tdaOutBuf } }, { binding: 2, resource: { buffer: paramBuf } }] });
                const icaBg = gpu.createBindGroup({ layout: bl, entries: [{ binding: 0, resource: { buffer: inBuf } }, { binding: 1, resource: { buffer: icaOutBuf } }, { binding: 2, resource: { buffer: paramBuf } }] });

                const totalReadSize = n * 4 + n * 4 * 4 + n * 2 * 4 + n * 4;
                readBuf = gpu.createBuffer({ size: totalReadSize, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
                const enc = gpu.createCommandEncoder();
                
                const kPass = enc.beginComputePass(); kPass.setPipeline(kolmogorovPipeline); kPass.setBindGroup(0, kBg); kPass.dispatchWorkgroups(Math.ceil(n / 64)); kPass.end();
                const tPass = enc.beginComputePass(); tPass.setPipeline(takensPipeline); tPass.setBindGroup(0, tBg); tPass.dispatchWorkgroups(Math.ceil(n / 64)); tPass.end();
                const tdaPass = enc.beginComputePass(); tdaPass.setPipeline(tdaPipeline); tdaPass.setBindGroup(0, tdaBg); tPass.dispatchWorkgroups(Math.ceil(n / 64)); tdaPass.end();
                const icaPass = enc.beginComputePass(); icaPass.setPipeline(icaPipeline); icaPass.setBindGroup(0, icaBg); icaPass.dispatchWorkgroups(Math.ceil(n / 64)); icaPass.end();

                let readOffset = 0;
                enc.copyBufferToBuffer(kOutBuf, 0, readBuf, readOffset, n * 4); readOffset += n * 4;
                enc.copyBufferToBuffer(tOutBuf, 0, readBuf, readOffset, n * 4 * 4); readOffset += n * 4 * 4;
                enc.copyBufferToBuffer(tdaOutBuf, 0, readBuf, readOffset, n * 2 * 4); readOffset += n * 2 * 4;
                enc.copyBufferToBuffer(icaOutBuf, 0, readBuf, readOffset, n * 4); readOffset += n * 4;

                gpu.queue.submit([enc.finish()]);

                await readBuf.mapAsync(GPUMapMode.READ);
                const res = new Float32Array(readBuf.getMappedRange());
                let off = 0;
                const kRes = res.subarray(off, off + n); off += n;
                const tRes = res.subarray(off, off + n * 4); off += n * 4;
                const tdaRes = res.subarray(off, off + n * 2); off += n * 2;
                const icaRes = res.subarray(off, off + n); off += n;

                for (let i = 0; i < n; i++) {
                    const url = candidates[i].url;
                    const osc = oscillators.get(url);
                    if (osc) osc.complexity = kRes[i];
                    
                    injectEcho('ica.' + i, icaRes[i]);
                    const tBase = i * 4;
                    injectEcho('takens.' + url + '.cx', tRes[tBase]);
                    injectEcho('takens.' + url + '.cy', tRes[tBase + 1]);
                    injectEcho('takens.' + url + '.cz', tRes[tBase + 2]);
                    injectEcho('takens.' + url + '.spread', tRes[tBase + 3]);
                    injectEcho('tda.' + url + '.persistence', tdaRes[i * 2]);
                    injectEcho('tda.' + url + '.betti0', tdaRes[i * 2 + 1]);
                }

                readBuf.unmap();

                for (const [aUrl, aOsc] of oscillators) {
                    if (!aOsc.write) continue;
                    if (aOsc.filled < topologyRingSize) continue;
                    const aRing = unrollRing(aOsc.ring, aOsc.idx, topologyRingSize);
                    for (const [tUrl, tOsc] of oscillators) {
                        if (!tOsc.read && !tOsc.write) continue;
                        if (tUrl === aUrl) continue;
                        if (tOsc.filled < topologyRingSize) continue;
                        const tRing = unrollRing(tOsc.ring, tOsc.idx, topologyRingSize);
                        const te = calculateContinuousTE(aRing, tRing);
                        if (te > 0) injectEcho('transfer.' + aUrl + '>' + tUrl, te);
                    }
                }

            } catch (e) {
                reportState('GPU_TOPOLOGY_FAIL', e.message);
            } finally {
                if (inBuf) inBuf.destroy();
                if (kOutBuf) kOutBuf.destroy();
                if (tOutBuf) tOutBuf.destroy();
                if (tdaOutBuf) tdaOutBuf.destroy();
                if (icaOutBuf) icaOutBuf.destroy();
                if (paramBuf) paramBuf.destroy();
                if (readBuf) readBuf.destroy();
                
                const evalDuration = performance.now() - evalStartTime;
                if (evalDuration > 0 && stableTick > 0) {
                    const targetDuration = stableTick;
                    const ratio = Math.sqrt(targetDuration / evalDuration);
                    topologyRingSize = Math.max(10, Math.min(CAPTURE_RING_SIZE, Math.floor(topologyRingSize * ratio)));
                }
                
                topologyPending = false;
            }
        }

        function measureG() { let s=0,c=0; for(const o of oscillators.values()){ if(o.filled>0&&!isInternalMetric(o.url)){ s+=o.median*o.median*o.presenceWeight; c+=o.presenceWeight; } } return c>0?Math.sqrt(s/c):1.0; }
        function measureVC() { let s=0,c=0; for(const o of oscillators.values()){ if(o.filled>1&&!isInternalMetric(o.url)){ const p=(o.idx-2+CAPTURE_RING_SIZE)%CAPTURE_RING_SIZE; s+=Math.abs((o.ring[o.idx-1]-o.ring[p])*o.presenceWeight); c+=o.presenceWeight; } } return c>0?(s/c)/C:0.0; }
        function measureDecay() { let t=0,c=0; for(const o of oscillators.values()){ if(o.complexity>0&&!isInternalMetric(o.url)){ t+=o.complexity*o.presenceWeight; c+=o.presenceWeight; } } return c>0?1.0/(1.0+(t/c)):1.0; }
        function measureQuantum() { let s=0,c=0; for(const [p,o] of oscillators){ if(p.startsWith('takens.')&&p.endsWith('.spread')){ s+=Math.abs(o.median)*o.presenceWeight; c+=o.presenceWeight; } } return c===0?1.0:Math.exp(-s/c); }
        function measureCoherence() { let teSum=0,teCount=0,cplxSum=0,cplxCount=0; for(const [p,o] of oscillators){ if(p.startsWith('transfer.')){teSum+=Math.abs(o.median)*o.presenceWeight;teCount+=o.presenceWeight;} if(o.complexity>0&&!isInternalMetric(p)){cplxSum+=o.complexity*o.presenceWeight;cplxCount+=o.presenceWeight;} } const te=teCount>0?teSum/teCount:0; const cplx=cplxCount>0?cplxSum/cplxCount:0; return cplx>0?te/(cplx+Number.EPSILON):0; }

        let audioCtx = null, audioSrc = null, audioGain = null, audioBuffer = null;
        function startAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioGain = audioCtx.createGain(); audioGain.gain.setValueAtTime(0, audioCtx.currentTime);
                audioGain.connect(audioCtx.destination);
                audioBuffer = audioCtx.createBuffer(1, CAPTURE_RING_SIZE, audioCtx.sampleRate);
                audioSrc = audioCtx.createBufferSource();
                audioSrc.buffer = audioBuffer; audioSrc.loop = true;
                audioSrc.connect(audioGain); audioSrc.start();
                oscillators.set('membrane.acoustic', createOscillator('membrane.acoustic', 0, null, (aperture) => {
                    try {
                        audioGain.gain.setTargetAtTime(Math.abs(aperture), audioCtx.currentTime, transport.tickTime / 1000);
                        if (aperture < Number.EPSILON) return;
                        const channelData = audioBuffer.getChannelData(0);
                        const threads = getRingBuffers();
                        if (threads.length === 0) return;
                        for (let i = 0; i < CAPTURE_RING_SIZE; i++) {
                            let sum = 0;
                            for (let t = 0; t < threads.length; t++) sum += threads[t][i];
                            channelData[i] = (sum / threads.length) * aperture;
                        }
                    } catch {}
                }));
            } catch {}
        }
        document.addEventListener('click', startAudio, { once: true });
        document.addEventListener('touchstart', startAudio, { once: true });

        if (navigator.vibrate) {
            oscillators.set('membrane.kinetic', createOscillator('membrane.kinetic', 0, null, (aperture) => {
                if (aperture < Number.EPSILON) { navigator.vibrate(0); return; }
                navigator.vibrate(Math.max(1, Math.floor(aperture * transport.tickTime)));
            }));
        }

        let activeSerialPort = null;
        if (navigator.serial) {
            navigator.serial.requestPort().then(port => { port.open({ baudRate: 115200 }).then(() => { activeSerialPort = port; }); }).catch(() => {});
            oscillators.set('membrane.serial', createOscillator('membrane.serial', 0, null, async (aperture) => {
                if (!activeSerialPort || !activeSerialPort.writable || aperture < Number.EPSILON) return;
                try {
                    const writer = activeSerialPort.writable.getWriter();
                    const threads = getRingBuffers();
                    if (threads.length > 0) {
                        const sendBuf = new Uint8Array(threads[0].length);
                        for (let i = 0; i < sendBuf.length; i++) sendBuf[i] = (threads[0][i] * aperture) & 255;
                        await writer.write(sendBuf);
                    }
                    writer.releaseLock();
                } catch {}
            }));
        }

        const canvas = document.createElement('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;image-rendering:pixelated;z-index:-1;';
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        const imgData = ctx.createImageData(canvas.width, canvas.height);
        const data8 = imgData.data;

        oscillators.set('membrane.photon', createOscillator('membrane.photon', 0, null, (aperture) => {
            if (aperture < Number.EPSILON) { data8.fill(0); ctx.putImageData(imgData, 0, 0); return; }
            const threads = getRingBuffers();
            if (threads.length === 0) { data8.fill(0); ctx.putImageData(imgData, 0, 0); return; }
            let tIdx = 0, tByteIdx = 0;
            const threadsCount = threads.length;
            const threadLen = threads[0].length;
            for (let i = 0; i < data8.length; i++) {
                if ((i & 3) === 3) { data8[i] = 255; } 
                else {
                    data8[i] = (threads[tIdx][tByteIdx] * aperture) & 255;
                    tByteIdx++;
                    if (tByteIdx >= threadLen) { tByteIdx = 0; tIdx = (tIdx + 1) % threadsCount; }
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }));

        function getRingBuffers() {
            const threads = [];
            for (const [url, osc] of oscillators) {
                if (osc.filled === CAPTURE_RING_SIZE && !osc.write && !isInternalMetric(url)) {
                    const weightedRing = new Float32Array(CAPTURE_RING_SIZE);
                    for (let i = 0; i < CAPTURE_RING_SIZE; i++) weightedRing[i] = osc.ring[i] * osc.presenceWeight;
                    threads.push(new Uint8Array(weightedRing.buffer));
                }
            }
            return threads;
        }

        const GROUND_STATE = Number.EPSILON;

        function updateApertureGradient(osc) {
            let outTE = 0;
            for (const [p, o] of oscillators) {
                if (p.startsWith('transfer.' + osc.url + '>')) outTE += Math.abs(o.median);
            }
            const deltaTE = outTE - (osc.lastOutTE || 0);
            osc.lastOutTE = outTE;
            
            if (osc.direction === undefined) osc.direction = 1;
            osc.ticksSinceTurn = (osc.ticksSinceTurn || 0) + 1;
            
            if (osc.direction > 0 && deltaTE < 0) { osc.naturalLatencyTicks = osc.ticksSinceTurn; osc.direction = -1; osc.ticksSinceTurn = 0; } 
            if (osc.direction < 0 && (deltaTE > 0 || osc.exploration <= GROUND_STATE)) { osc.naturalLatencyTicks = osc.ticksSinceTurn; osc.direction = 1; osc.ticksSinceTurn = 0; }
            
            const latency = Math.max(1, osc.naturalLatencyTicks || (CAPTURE_RING_SIZE / Φ));
            const step = 1.0 / latency; 
            
            osc.exploration += osc.direction * step; 
            osc.exploration = Math.max(GROUND_STATE, Math.min(1.0, osc.exploration));
        }

        function getAperture(osc) { 
            if (!osc) return 0;
            return Math.sin(osc.exploration * (Math.PI / 2));
        }

        function manifestField() {
            for (const [url, osc] of oscillators) {
                if (!osc.write) continue;
                const val = getAperture(osc);
                osc.write(val);
                injectEcho(url, val);
            }
        }

        async function ω(ts) {
            const rawTick = lastTs > 0 ? ts - lastTs : Φ;
            lastTs = ts;
            if (rawTick > 0) stableTick = stableTick > 0 ? stableTick * (1 - MA) + rawTick * MA : rawTick;
            transport.tickTime = stableTick;

            const physT = j2000(φ['server.time'] || 0);
            const physEcef = geodeticToEcef(φ['geolocation.latitude'] || 0, φ['geolocation.longitude'] || 0, φ['geolocation.altitude'] || 0);
            
            let maxWeight = 0;
            let targetT = tPresence;
            let targetX = spatialPresence.x;
            let targetY = spatialPresence.y;
            let targetZ = spatialPresence.z;
            
            for (const [url, osc] of oscillators) {
                if (osc.presenceWeight > maxWeight && !isInternalMetric(url) && !osc.write) {
                    maxWeight = osc.presenceWeight;
                    targetT = osc.originT;
                    targetX = osc.originPos.x;
                    targetY = osc.originPos.y;
                    targetZ = osc.originPos.z;
                }
            }
            
            const dxDrift = targetX - spatialPresence.x;
            const dyDrift = targetY - spatialPresence.y;
            const dzDrift = targetZ - spatialPresence.z;
            const dtDrift = Math.abs(targetT - tPresence) * 86400.0 * C;
            const dist4DDrift = Math.sqrt(dxDrift*dxDrift + dyDrift*dyDrift + dzDrift*dzDrift + dtDrift*dtDrift);
            
            const driftSpeed = MA / (1.0 + (dist4DDrift / C));
            
            tOffset += (targetT - tPresence) * driftSpeed;
            spatialOffset.x += dxDrift * driftSpeed;
            spatialOffset.y += dyDrift * driftSpeed;
            spatialOffset.z += dzDrift * driftSpeed;

            tPresence = physT + tOffset;
            spatialPresence = { x: physEcef.x + spatialOffset.x, y: physEcef.y + spatialOffset.y, z: physEcef.z + spatialOffset.z };

            if (prevTPresence === 0) { prevTPresence = tPresence; prevSpatialPresence = { ...spatialPresence }; }
            
            calculatePresenceWeights();

            const naturalTAdvance = rawTick / 86400000.0;
            const awarenessTAdvance = tPresence - prevTPresence;
            const scrollSpeedT = Math.abs(awarenessTAdvance - naturalTAdvance) * 86400.0 * C;
            const scrollSpeedX = spatialPresence.x - prevSpatialPresence.x;
            const scrollSpeedY = spatialPresence.y - prevSpatialPresence.y;
            const scrollSpeedZ = spatialPresence.z - prevSpatialPresence.z;
            const scrollSpeedS = Math.sqrt(scrollSpeedX*scrollSpeedX + scrollSpeedY*scrollSpeedY + scrollSpeedZ*scrollSpeedZ);
            const awarenessMovement = scrollSpeedT + scrollSpeedS;
            clarity = Math.exp(-awarenessMovement / (1.0 + (measureG() * Φ)));
            
            prevTPresence = tPresence;
            prevSpatialPresence = { ...spatialPresence };

            const transmitList = [];
            for (const [url, osc] of oscillators) {
                let val = osc.median;
                if (osc.read) {
                    let readVal = osc.read();
                    if (readVal !== null && typeof readVal === 'number') {
                        injectEcho(url, readVal, physT, physEcef.x, physEcef.y, physEcef.z);
                        val = osc.median;
                    }
                }
                if (val === null || typeof val !== 'number') continue;
                const delta = Math.abs(val - (osc.lastTransmitted || 0));
                if (delta > osc.complexity) {
                    osc.lastTransmitted = val;
                    transmitList.push({ name: url, value: val, t: physT, x: physEcef.x, y: physEcef.y, z: physEcef.z });
                }
            }

            if (transmitList.length > 0) { try { await syncField(transmitList, spatialPresence); } catch {} }

            runSignalTopology();

            for (const [url, osc] of oscillators) { if (osc.write) updateApertureGradient(osc); }

            manifestField();

            const g = measureG(); const vC = measureVC(); const decay = measureDecay(); const quantum = measureQuantum();
            certainty = Math.exp(-vC / (g + (1.0 / C))) * quantum * decay * clarity;

            const noDue = lastNostrPub + stableTick * Φ * Φ * Φ - ts;
            if (noDue <= 0 && nostrPub && nostrRelay && nostrRelay.readyState === WebSocket.OPEN && nostrModule) {
                lastNostrPub = ts;
                const srvTime = φ['server.time'];
                if (typeof srvTime === 'number' && isFinite(srvTime)) {
                    const physLat = φ['geolocation.latitude']; const physLon = φ['geolocation.longitude'];
                    if (physLat !== undefined && physLon !== undefined) {
                        const payload = {};
                        for (const [path, osc] of oscillators) {
                            if (isInternalMetric(path) || osc.write) continue;
                            if (osc.complexity > 0) payload[path] = osc.median;
                        }
                        const content = JSON.stringify(payload);
                        if (content !== '{}') {
                            try {
                                const event = nostrModule.finalizeEvent({ kind: 1111, created_at: Math.floor(srvTime), tags: [['geo', String(physLat) + ',' + String(physLon)]], content }, nostrPub);
                                nostrRelay.send(JSON.stringify(['EVENT', event]));
                            } catch {}
                        }
                    }
                }
            }

            if (ts - lastDiscovery > stableTick * CAPTURE_RING_SIZE) { lastDiscovery = ts; visited = new WeakSet(); discoverObj(window, '', 0); }

            if (!debugEl) {
                debugEl = document.createElement('textarea');
                debugEl.readOnly = true;
                debugEl.style.cssText = 'position:fixed;bottom:4px;left:4px;font:10px monospace;color:#0f0;background:rgba(0,0,0,0.9);padding:4px;margin:0;border:none;z-index:9999;line-height:1.4;width:300px;height:60px;resize:none';
                document.body.appendChild(debugEl);
            }
            if (ts - lastDebug > 1000) {
                lastDebug = ts;
                let active = 0, phantom = 0;
                for (const o of oscillators.values()) { if (o.write) { if (o.exploration > Number.EPSILON) active++; else phantom++; } }
                debugEl.value = `Osz:${oscillators.size} C:${certainty.toFixed(3)}\nActiveOut:${active} Phantom:${phantom} Coh:${measureCoherence().toFixed(3)}`;
            }

            let nextDelay = stableTick / (certainty > Number.EPSILON ? certainty : Number.EPSILON);
            nextDelay = Math.max(4, Math.min(nextDelay, stableTick * CAPTURE_RING_SIZE));
            setTimeout(() => { try { ω(performance.now()); } catch (e) { reportState('TICK_FAIL', e.message); setTimeout(() => ω(performance.now()), 0); } }, nextDelay);
        }

        async function bootstrapNetwork() {
            try {
                nostrModule = await import('https://esm.sh/nostr-tools@2.7.0/pure.js');
                let privKey = localStorage.getItem('omegaflow_nostr_key');
                if (!privKey) { privKey = nostrModule.generateSecretKey(); localStorage.setItem('omegaflow_nostr_key', JSON.stringify(Array.from(privKey))); }
                else { privKey = new Uint8Array(JSON.parse(privKey)); }
                nostrRelay = new WebSocket('wss://relay.damus.io');
                nostrRelay.binaryType = 'arraybuffer';
                nostrRelay.addEventListener('open', () => { nostrRelay.send(JSON.stringify(['REQ', 'omegaflow', { kinds: [1111] }])); nostrPub = privKey; });
                nostrRelay.addEventListener('message', (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        if (data[0] === 'EVENT' && data[2] && data[2].kind === 39603) {
                            const event = data[2];
                            const geoTag = event.tags.find(t => t[0] === 'geo');
                            if (!geoTag) return;
                            const [latStr, lonStr] = geoTag[1].split(',');
                            const lat = parseFloat(latStr); const lon = parseFloat(lonStr);
                            if (isNaN(lat) || isNaN(lon)) return;
                            try {
                                const payload = JSON.parse(event.content);
                                const remoteEcef = geodeticToEcef(lat, lon, 0);
                                const remoteT = j2000(event.created_at);
                                for (const [key, val] of Object.entries(payload)) {
                                    if (typeof val === 'number') {
                                        injectEcho('omega_flow.' + key, val, remoteT, remoteEcef.x, remoteEcef.y, remoteEcef.z);
                                        injectEcho('omega_flow.divergence.' + key, Math.abs((oscillators.get(key)?.median || 0) - val), remoteT, remoteEcef.x, remoteEcef.y, remoteEcef.z);
                                    }
                                }
                            } catch {}
                        }
                    } catch {}
                });
                nostrRelay.addEventListener('close', () => { nostrRelay = null; });
            } catch {}
        }

        discoverObj(window, '', 0);
        registerEvents();
        bootstrapNetwork();

        window.addEventListener('error', (e) => { reportState('ERROR', e.message + ' @ ' + e.filename + ':' + e.lineno); e.preventDefault(); });
        window.addEventListener('unhandledrejection', (e) => { reportState('REJECTION', String(e.reason)); e.preventDefault(); });
        setTimeout(() => ω(performance.now()), 0);
    </script>
