<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>omegaflow</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    </style>
</head>
<body>
    <script type="module">
        import { get, φ, pulse } from '/world.js';

        const φ = 1.618033988749895;
        const C = 299792458.0;
        const WGS84_A = 6378137.0;
        const WGS84_F = 1.0 / 298.257223563;
        const dormant = new Set();

        try {
            const res = await fetch('/dormant');
            const t = await res.text();
            for (const line of t.split('\n')) {
                const parts = line.trim().split(/\s+/);
                if (parts[0] === 'dormant' && parts.length >= 2) {
                    if (parts.length >= 4) {
                        if (parseInt(parts[2]) > 0 && parseInt(parts[3]) === 0) {
                            dormant.add(parts[1]);
                        }
                    } else {
                        dormant.add(parts[1]);
                    }
                }
            }
        } catch {}

        const circular = new Set(['window','self','top','parent','frames','opener',
            'frameElement','__proto__','constructor','prototype', 'omegaflow']);
        const silent = new Set();
        const eventSources = new Set();
        const resonanceMap = new Map();
        const sensors = new Map();
        const actuators = new Map();
        let visited = new WeakSet();

        let discoveryInterval = null;
        let gamepadInterval = null;
        let lastDiscovery = 0;
        let lastGamepadPoll = 0;
        let lastGamepadState = '';
        let lastSensorCount = 0;
        let lastTs = 0;
        let certainty = 1.0;

        let inputBuffer = [];
        let queryBuffer = [];
        let lastBatchFetch = 0;
        let lastInfoCollect = 0;
        let cachedEcef = { x: 0, y: 0, z: 0 };
        let cachedJ2000 = 0;

        let topologyInterval = null;
        let lastTopology = 0;

        let nostrRelay = null;
        let nostrPub = null;
        let lastNostrPub = 0;
        let stableTick = φ;
        let batchInterval = φ;
        let infoInterval = φ;
        let probeInterval = φ;

        const probeState = {
            phase: 'waiting',
            batch: [],
            stack: [],
            snapshot: null,
            pulseTime: 0,
        };

        window.ω = { get, φ, pulse, sensors, actuators, resonanceMap };

        φ['server.time'] = parseFloat(await (await fetch('/time')).text());

        const pulseWs = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/pulse`);
        pulseWs.binaryType = 'arraybuffer';
        pulse.ws = pulseWs;
        pulseWs.addEventListener('open', () => {});
        pulseWs.addEventListener('close', () => {
            location.reload();
        });
        pulseWs.addEventListener('message', (e) => {
            if (typeof e.data !== 'string') {
                const buf = new Uint8Array(e.data);
                if (buf.length < 13 || buf[0] !== 0xCF || buf[1] !== 0x86 || buf[2] !== 6) return;
                const dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
                const id = dv.getUint32(3, true);
                const pending = pulse.pending.get(id);
                if (pending) {
                    pulse.pending.delete(id);
                    pending.resolve(e.data);
                }
            }
        });

        function express() {
            const active = [];
            for (const s of sensors.values()) {
                if (s.complexity > 0) {
                    const deviation = Math.abs(s.val - s.median);
                    if (deviation > s.complexity) {
                        active.push({ sensor: s, weight: deviation / s.complexity });
                    }
                }
            }
            if (active.length === 0) return false;

            const scores = new Map();
            for (const { sensor, weight } of active) {
                for (const [actPath, sensorMap] of resonanceMap) {
                    if (sensorMap.has(sensor.path)) {
                        const data = sensorMap.get(sensor.path);
                        scores.set(actPath, (scores.get(actPath) || 0) + weight * data.magnitude);
                    }
                }
            }
            if (scores.size === 0) return false;

            let scoreSum = 0;
            for (const v of scores.values()) scoreSum += v;
            const scoreMean = scoreSum / scores.size;
            let varSum = 0;
            for (const v of scores.values()) { const d = v - scoreMean; varSum += d * d; }
            const scoreStd = Math.sqrt(varSum / scores.size);
            const threshold = scoreMean + scoreStd / φ;

            let fired = false;
            for (const [actPath, score] of scores) {
                if (score < threshold) continue;
                const a = actuators.get(actPath);
                if (!a) continue;
                const sm = resonanceMap.get(actPath);
                if (!sm) continue;
                let wsum = 0, tw = 0;
                for (const { sensor, weight } of active) {
                    if (sm.has(sensor.path)) {
                        const d = sm.get(sensor.path);
                        tw += d.threshold * weight;
                        wsum += weight;
                    }
                }
                const pulseTone = wsum > 0 ? tw / wsum : 1;
                if (pulseActuator(a, pulseTone)) fired = true;
            }
            return fired;
        }

        function isCalibrated() {
            let ready = 0;
            for (const s of sensors.values()) {
                if (s.complexity > 0) ready++;
            }
            return ready >= sensors.size / φ;
        }

        function checkProbing(ts) {
            const resonant = checkResonance(probeState.snapshot);
            if (resonant.length > 0) {
                sendResonant(probeState.batch);
                probeState.stack = [];
                startResolving(ts, probeState.batch);
            } else {
                sendResonant(probeState.batch);
                const calibrated = isCalibrated();
                for (const a of probeState.batch) {
                    if (calibrated) {
                        a.pulse *= φ;
                        if (a.pulse > getMedianComplexity() * φ) {
                            silent.add(a.path);
                            actuators.delete(a.path);
                        }
                    }
                }
                startProbing(ts);
            }
        }

        function checkResolving(ts) {
            const resonant = checkResonance(probeState.snapshot);

            if (resonant.length > 0 && probeState.batch.length === 1) {
                const actuator = probeState.batch[0];
                if (!resonanceMap.has(actuator.path)) {
                    resonanceMap.set(actuator.path, new Map());
                }
                for (const r of resonant) {
                    const existing = resonanceMap.get(actuator.path).get(r.path);
                    const predicted = probeState.predictions ? (probeState.predictions[r.path] || 0) : 0;
                    const Δ = Math.abs(r.magnitude - predicted);
                    const ma = 1 / (φ * φ);
                    if (existing) {
                        existing.threshold = existing.threshold * (1 - ma) + actuator.pulse * ma;
                        existing.magnitude = existing.magnitude * (1 - ma) + r.magnitude * ma;
                        existing.Δ = (existing.Δ || 0) * (1 - ma) + Δ * ma;
                    } else {
                        resonanceMap.get(actuator.path).set(r.path, {
                            threshold: actuator.pulse,
                            magnitude: r.magnitude,
                            divergence: Δ
                        });
                    }
                }
                try { pulseActuator(actuator, 0); } catch {}
                sendResonant([actuator]);
                if (probeState.stack.length > 0) {
                    const next = probeState.stack.pop();
                    startResolving(ts, next);
                } else {
                    startProbing(ts);
                }
                return;
            }

            if (resonant.length > 0 && probeState.batch.length > 1) {
                sendResonant(probeState.batch);
                startResolving(ts, probeState.batch);
                return;
            }

            sendResonant(probeState.batch);
            const calibrated = isCalibrated();
            for (const a of probeState.batch) {
                if (calibrated) {
                    a.pulse *= φ;
                    if (a.pulse > getMedianComplexity() * φ) {
                        silent.add(a.path);
                        actuators.delete(a.path);
                    }
                }
            }

            if (probeState.stack.length > 0) {
                const next = probeState.stack.pop();
                startResolving(ts, next);
            } else {
                startProbing(ts);
            }
        }

        function checkResonance(snap) {
            const resonant = [];
            for (const path in snap) {
                const s = sensors.get(path);
                if (!s) continue;
                const before = snap[path];
                if (before.complexity <= 0) continue;
                const Δ = Math.abs(s.val - before.val);
                if (Δ > before.complexity) {
                    resonant.push({ path, magnitude: Δ });
                }
            }
            return resonant;
        }

        function discoverObj(obj, path, depth) {
            if (depth > 3) return;
            if (obj == null || typeof obj !== 'object') return;
            if (visited.has(obj)) return;
            visited.add(obj);

            let keys;
            try { keys = Object.getOwnPropertyNames(obj); } catch { return; }

            for (const key of keys) {
                if (circular.has(key)) continue;
                if (key.startsWith('on') && key.length > 2) {
                    eventSources.add(key.slice(2).toLowerCase());
                    continue;
                }
                let val;
                try { val = obj[key]; } catch { continue; }
                if (val == null) continue;
                const p = path ? path + '.' + key : key;

                if (typeof val === 'number') {
                    if (!sensors.has(p)) {
                        sensors.set(p, { path: p, obj, key, val, interval: null, lastPoll: 0, complexity: 0, median: 0 });
                        pushInput(p, val);
                    }
                } else if (typeof val === 'boolean') {
                    if (!sensors.has(p)) {
                        sensors.set(p, { path: p, obj, key, val: val ? 1 : 0, interval: null, lastPoll: 0, complexity: 0, median: 0 });
                        pushInput(p, val ? 1 : 0);
                    }
                } else if (typeof val === 'function') {
                    if (!dormant.has(key) && !silent.has(p) && !actuators.has(p)) {
                        actuators.set(p, { path: p, obj, key, pulse: 1 / (φ * φ) });
                    }
                } else if (typeof val === 'object') {
                    if (!dormant.has(key) && !silent.has(p)) {
                        discoverObj(val, p, depth + 1);
                    }
                }
            }
        }





        function discoverSensors() {
            discoverObj(window, '', 0);
        }

        function pulseActuator(actuator, value) {
            try {
                const fn = actuator.obj[actuator.key];
                const result = typeof fn === 'function' ? fn(value) : fn;
                if (result && typeof result.catch === 'function') {
                    result.catch(() => {});
                }
                return true;
            } catch {
                silent.add(actuator.path);
                actuators.delete(actuator.path);
                return false;
            }
        }

        function pollGamepads() {
            const gps = navigator.getGamepads();
            let state = 0;
            for (let i = 0; i < gps.length; i++) {
                if (gps[i]) {
                    const gp = gps[i];
                    pushInput('gamepad[' + i + '].connected', gp.connected ? 1 : 0);
                    pushInput('gamepad[' + i + '].timestamp', gp.timestamp);
                    for (let a = 0; a < gp.axes.length; a++) {
                    pushInput('gamepad[' + i + '].axes[' + a + ']', gp.axes[a]);
                    state = state * 31 + (gp.axes[a] * Math.pow(2, 16) | 0);
                    }
                    for (let b = 0; b < gp.buttons.length; b++) {
                    pushInput('gamepad[' + i + '].buttons[' + b + '].pressed', gp.buttons[b].pressed ? 1 : 0);
                    pushInput('gamepad[' + i + '].buttons[' + b + '].value', gp.buttons[b].value);
                    state = state * 31 + (gp.buttons[b].value * Math.pow(2, 16) | 0);
                    }
                }
            }
            return state;
        }

        function readSensorVal(s, tickTime) {
            try {
                let v = s.obj[s.key];
                if (typeof v === 'function') v = v();
                if (typeof v === 'number') processSensorReading(s, v, tickTime);
                else if (typeof v === 'boolean') processSensorReading(s, v ? 1 : 0, tickTime);
            } catch {}
        }

        function registerEvents() {
            for (const evName of eventSources) {
                window.addEventListener(evName, (e) => {
                    const prefix = 'event.' + evName;
                    pushInput(prefix, performance.now());
                    for (const k of Object.getOwnPropertyNames(e)) {
                        const v = e[k];
                        if (typeof v === 'number') pushInput(prefix + '.' + k, v);
                    }
                    if (e.touches) {
                        pushInput(prefix + '.touches', e.touches.length);
                        for (let ti = 0; ti < e.touches.length; ti++) {
                            const tch = e.touches[ti];
                            const tp = prefix + '.touch[' + ti + ']';
                            for (const k of Object.getOwnPropertyNames(tch)) {
                                const v = tch[k];
                                if (typeof v === 'number') pushInput(tp + '.' + k, v);
                            }
                        }
                    }
                }, { passive: true });
            }
        }

        function sendPulse(batch) {
            if (pulseWs.readyState !== WebSocket.OPEN || batch.length === 0) return;
            pulseWs.send(JSON.stringify({ pulse: batch.map(a => a.path).join('|') }));
        }

        function sendResonant(batch) {
            if (pulseWs.readyState !== WebSocket.OPEN || batch.length === 0) return;
            pulseWs.send(JSON.stringify({ resonant: batch.map(a => a.path).join('|') }));
        }

        function snapshotSensors() {
            const snap = {};
            for (const [path, s] of sensors) {
                snap[path] = { val: s.val, complexity: s.complexity };
            }
            return snap;
        }

        function splitBatch(batch) {
            const splitIdx = Math.floor(batch.length / φ);
            return { left: batch.slice(0, splitIdx), right: batch.slice(splitIdx) };
        }

        function getMedianComplexity() {
            const vals = [];
            for (const s of sensors.values()) {
                if (s.complexity > 0) vals.push(s.complexity);
            }
            if (vals.length === 0) return 1 / (φ * φ);
            vals.sort((a, b) => a - b);
            const mid = Math.floor(vals.length / 2);
            return vals.length % 2 ? vals[mid] : (vals[mid - 1] + vals[mid]) / 2;
        }

        function startProbing(ts) {
            const prune = 1 - 1 / (φ * φ);
            let totalΔ = 0;
            for (const [actPath, sensorMap] of resonanceMap) {
                for (const [spath, data] of sensorMap) {
                    data.magnitude *= prune;
                    data.Δ = (data.Δ || 0) * prune;
                    totalΔ += data.Δ;
                    if (data.magnitude < 1 / ringSize) sensorMap.delete(spath);
                }
                if (sensorMap.size === 0) resonanceMap.delete(actPath);
            }
            pushInput('divergence', totalΔ);
            probeState.batch = Array.from(actuators.values());
            if (probeState.batch.length === 0) {
                probeState.phase = 'waiting';
                return;
            }
            const predictions = {};
            for (const a of probeState.batch) {
                const sm = resonanceMap.get(a.path);
                if (sm) {
                    for (const [spath, data] of sm) {
                        predictions[spath] = (predictions[spath] || 0) + data.magnitude;
                    }
                }
            }
            sendPulse(probeState.batch);
            probeState.snapshot = snapshotSensors();
            probeState.predictions = predictions;
            for (const a of probeState.batch) {
                pulseActuator(a, a.pulse);
            }
            probeState.pulseTime = ts;
            probeState.phase = 'probing';
        }

        function startResolving(ts, batch) {
            if (batch.length <= 1) {
                probeState.batch = batch;
                sendPulse(batch);
                probeState.snapshot = snapshotSensors();
                for (const a of batch) {
                    pulseActuator(a, a.pulse);
                }
                probeState.pulseTime = ts;
                probeState.phase = 'resolving';
                return;
            }

            const { left, right } = splitBatch(batch);
            probeState.stack.push(right);
            probeState.batch = left;
            sendPulse(left);
            probeState.snapshot = snapshotSensors();
            for (const a of left) {
                pulseActuator(a, a.pulse);
            }
            probeState.pulseTime = ts;
            probeState.phase = 'resolving';
        }

        function geodeticToEcef(lat, lon, alt) {
            const a = WGS84_A, f = WGS84_F, e2 = f*(2-f);
            const latR = lat*Math.PI/180, lonR = lon*Math.PI/180;
            const n = a/Math.sqrt(1-e2*Math.sin(latR)*Math.sin(latR));
            const x = (n+alt)*Math.cos(latR)*Math.cos(lonR);
            const y = (n+alt)*Math.cos(latR)*Math.sin(lonR);
            const z = (n*(1-e2)+alt)*Math.sin(latR);
            return { x, y, z };
        }

        function pushInput(name, value) {
            if (typeof value !== 'number') return;
            inputBuffer.push({ name, value, t: cachedJ2000, x: cachedEcef.x, y: cachedEcef.y, z: cachedEcef.z });
        }

        function ω(ts) {
            const rawTick = lastTs > 0 ? ts - lastTs : φ;
            lastTs = ts;
            if (probeState.phase === 'waiting' && rawTick > 0) {
                const ma = 1 / (φ * φ);
                stableTick = stableTick > 0 ? stableTick * (1 - ma) + rawTick * ma : rawTick;
            }
            const tickTime = stableTick;

            const lat = φ['geolocation.latitude'] || 0;
            const lon = φ['geolocation.longitude'] || 0;
            const alt = φ['geolocation.altitude'] || 0;
            const t_j2000 = (φ['server.time'] / 86400.0) + 2440587.5 - 2451545.0;
            cachedEcef = geodeticToEcef(lat, lon, alt);
            cachedJ2000 = t_j2000;
            queryBuffer.push({ t: t_j2000, x: cachedEcef.x, y: cachedEcef.y, z: cachedEcef.z });

            if (batchInterval === null) batchInterval = φ;
            const batchDue = lastBatchFetch + batchInterval - ts;
            if ((inputBuffer.length > 0 || queryBuffer.length > 0) && (batchDue <= 0 || queryBuffer.length >= 128)) {
                lastBatchFetch = ts;
                const inputs = inputBuffer.splice(0);
                const queries = queryBuffer.splice(0);
                get(inputs, queries).then(r => {
                    for (const key in r) { φ[key] = r[key]; }
                    if (r.certainty !== undefined) certainty = r.certainty;
                }).catch(() => {});
                if (inputBuffer.length === 0) batchInterval *= φ;
                batchInterval = Math.max(batchInterval, φ);
                else batchInterval = Math.max(batchInterval / φ, φ);
            }

            let nextDelay = Infinity;

            const probing = probeState.phase === 'probing' || probeState.phase === 'resolving';
            for (const s of sensors.values()) {
                if (probing) {
                    s.lastPoll = ts;
                    readSensorVal(s, tickTime);
                    nextDelay = Math.min(nextDelay, stableTick);
                } else {
                    if (s.interval === null) s.interval = tickTime;
                    const due = s.lastPoll + s.interval - ts;
                    if (due <= 0) {
                        s.lastPoll = ts;
                        readSensorVal(s, tickTime);
                        nextDelay = Math.min(nextDelay, s.interval);
                    } else {
                        nextDelay = Math.min(nextDelay, due);
                    }
                }
            }

            if (navigator.getGamepads) {
                if (gamepadInterval === null) gamepadInterval = tickTime;
                const gpDue = lastGamepadPoll + gamepadInterval - ts;
                if (gpDue <= 0) {
                    lastGamepadPoll = ts;
                    const state = pollGamepads();
                    if (state !== lastGamepadState) {
                        gamepadInterval = tickTime;
                        lastGamepadState = state;
                    } else {
                        gamepadInterval *= φ;
                gamepadInterval = Math.max(gamepadInterval, φ);
                    }
                    nextDelay = Math.min(nextDelay, gamepadInterval);
                } else {
                    nextDelay = Math.min(nextDelay, gpDue);
                }
            }

            if (discoveryInterval === null) discoveryInterval = tickTime;
            const dDue = lastDiscovery + discoveryInterval - ts;
            if (dDue <= 0) {
                lastDiscovery = ts;
                visited = new WeakSet();
                discoverSensors();
                if (sensors.size !== lastSensorCount) {
                    lastSensorCount = sensors.size;
                }
                discoveryInterval *= φ;
                discoveryInterval = Math.max(discoveryInterval, φ);
                nextDelay = Math.min(nextDelay, discoveryInterval);
            } else {
                nextDelay = Math.min(nextDelay, dDue);
            }

            if (probeState.phase === 'waiting') {
                if (!express()) {
                    if (actuators.size > 0 && sensors.size > 0) {
                        let avgComplexity = 0;
                        for (const s of sensors.values()) avgComplexity += s.complexity;
                        avgComplexity /= sensors.size;
                        const curiosity = 1 - avgComplexity;
                        if (resonanceMap.size === 0 || Math.random() < curiosity) {
                            startProbing(ts);
                        }
                    }
                }
            } else if (probeState.phase === 'probing') {
                checkProbing(ts);
            } else if (probeState.phase === 'resolving') {
                checkResolving(ts);
            }

            if (probeState.phase === 'probing' || probeState.phase === 'resolving') {

                nextDelay = Math.max(probeInterval, stableTick);
            }

            if (topologyInterval === null) topologyInterval = tickTime;
            const topoDue = lastTopology + topologyInterval - ts;
            if (topoDue <= 0) {
                lastTopology = ts;
                runSignalTopology(ts);
                const divergence = φ['divergence'] || 0;
                topologyInterval = divergence > sensors.size ? tickTime : topologyInterval * φ;
                nextDelay = Math.min(nextDelay, topologyInterval);
            } else {
                nextDelay = Math.min(nextDelay, topoDue);
            }

            if (infoInterval === null) infoInterval = φ;
            const icDue = lastInfoCollect + infoInterval - ts;
            if (icDue <= 0) {
                lastInfoCollect = ts;
                pushInput('system.cpu', navigator.hardwareConcurrency || 0);
                if (performance.memory) {
                    pushInput('system.memory', performance.memory.usedJSHeapSize);
                    pushInput('system.memoryTotal', performance.memory.totalJSHeapSize);
                }
                const t0 = performance.now();
                fetch('/time').then(() => {
                    pushInput('system.latency', performance.now() - t0);
                }).catch(() => {});
                infoInterval *= φ;
                infoInterval = Math.max(infoInterval, φ);
                nextDelay = Math.min(nextDelay, infoInterval);
            } else {
                nextDelay = Math.min(nextDelay, icDue);
            }

            if (probeInterval === null) probeInterval = φ;
            const noDue = lastNostrPub + probeInterval * φ * φ - ts;
            if (noDue <= 0 && nostrPub && nostrRelay && nostrRelay.readyState === WebSocket.OPEN && nostrModule) {
                lastNostrPub = ts;
                const physLat = φ['geolocation.latitude'];
                const physLon = φ['geolocation.longitude'];
                if (physLat !== undefined && physLon !== undefined) {
                    const payload = {};
                    for (const key in φ) {
                        if (key.startsWith('server.') || key.startsWith('system.') || key.startsWith('omega_flow.')) continue;
                        const val = φ[key];
                        if (typeof val === 'number') payload[key] = val;
                    }
                    const content = JSON.stringify(payload);
                    if (content !== '{}') {
                        try {
                            const event = nostrModule.finalizeEvent({
                                kind: 39603,
                                created_at: Math.floor(Date.now() / 1000),
                                tags: [['geo', physLat.toFixed(4) + ',' + physLon.toFixed(4)]],
                                content: content
                            }, nostrPub);
                            nostrRelay.send(JSON.stringify(['EVENT', event]));
                        } catch {}
                    }
                }
                nextDelay = Math.min(nextDelay, probeInterval * φ * φ);
            } else {
                nextDelay = Math.min(nextDelay, noDue);
            }

            if (nextDelay === Infinity) {
                nextDelay = stableTick > 0 ? stableTick : φ;
            }

            if (document.hidden) {
                nextDelay = Math.max(nextDelay, tickTime * φ);
            }

            setTimeout(() => {
                try { ω(performance.now()); } catch (e) { console.warn(e); setTimeout(() => ω(performance.now()), 0); }
            }, nextDelay);
        }

        function tryStartBattery() {
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    const push = () => {
                        pushInput('battery.charging', b.charging ? 1 : 0);
                        pushInput('battery.chargingTime', b.chargingTime);
                        pushInput('battery.dischargingTime', b.dischargingTime);
                        pushInput('battery.level', b.level);
                    };
                    push();
                    b.addEventListener('chargingchange', push, { passive: true });
                    b.addEventListener('levelchange', push, { passive: true });
                }).catch(() => {});
            }
        }

        function tryStartGeolocation() {
            if (navigator.geolocation && navigator.geolocation.watchPosition) {
                navigator.geolocation.watchPosition(pos => {
                    const cc = pos.coords;
                    pushInput('geolocation.latitude', cc.latitude);
                    pushInput('geolocation.longitude', cc.longitude);
                    pushInput('geolocation.accuracy', cc.accuracy);
                    if (cc.altitude !== null) pushInput('geolocation.altitude', cc.altitude);
                    if (cc.heading !== null) pushInput('geolocation.heading', cc.heading);
                    if (cc.speed !== null) pushInput('geolocation.speed', cc.speed);

        const kolmogorovShader = `
let PHI = 1.618033988749895;
@group(0) @binding(0) var<storage, read> data: array<f32>;
@group(0) @binding(1) var<storage, read_write> complexity: array<f32>;
@group(0) @binding(2) var<uniform> params: vec4<f32>;
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
    let s = gid.x;
    let n = u32(params.x);
    let rs = u32(params.y);
    if (s >= n) { return; }
    let base = s * rs;
    var sum: f32 = 0.0;
    for (var i = 0u; i < rs; i++) { sum += data[base + i]; }
    let mean = sum / f32(rs);
    var var_sum: f32 = 0.0;
    for (var i = 0u; i < rs; i++) { let d = data[base + i] - mean; var_sum += d * d; }
    let threshold = sqrt(var_sum / f32(rs)) / (PHI * PHI);
    var repeats: f32 = 0.0;
    for (var i = 0u; i < rs; i++) {
        let vi = data[base + i];
        for (var j = i + 1u; j < rs; j++) {
            if (abs(vi - data[base + j]) < threshold) { repeats += 1.0; }
        }
    }
    let total = f32(rs * (rs - 1u) / 2u);
    complexity[s] = 1.0 - (repeats / total);
}
`;

        const takensShader = `
let PHI = 1.618033988749895;
@group(0) @binding(0) var<storage, read> data: array<f32>;
@group(0) @binding(1) var<storage, read_write> out: array<f32>;
@group(0) @binding(2) var<uniform> params: vec4<f32>;
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
    let s = gid.x;
    let n = u32(params.x);
    let rs = u32(params.y);
    if (s >= n) { return; }
    let base = s * rs;
    var sum: f32 = 0.0;
    for (var i = 0u; i < rs; i++) { sum += data[base + i]; }
    let mean = sum / f32(rs);
    var best_tau: u32 = 1u;
    var mi_prev: f32 = data[base];
    var mi_prev2: f32 = data[base];
    let max_lag = u32(f32(rs) / PHI);
    for (var lag = 1u; lag <= max_lag; lag++) {
    var mn: f32 = data[base]; var mx: f32 = data[base];
        for (var i = 0u; i < rs - lag; i++) {
            mn = min(mn, data[base + i]); mx = max(mx, data[base + i]);
        }
        let range = mx - mn + (1.0 / 86400.0);
        var h00: f32 = 0.0; var h01: f32 = 0.0; var h10: f32 = 0.0; var h11: f32 = 0.0;
        for (var i = 0u; i < rs - lag; i++) {
            let b1 = select(0u, 1u, data[base + i] > mn + range * 0.5);
            let b2 = select(0u, 1u, data[base + i + lag] > mn + range * 0.5);
            if (b1 == 0u && b2 == 0u) { h00 += 1.0; }
            else if (b1 == 0u && b2 == 1u) { h01 += 1.0; }
            else if (b1 == 1u && b2 == 0u) { h10 += 1.0; }
            else { h11 += 1.0; }
        }
        let total = f32(rs - lag);
        let p0 = (h00 + h01) / total; let p1 = (h10 + h11) / total;
        let q0 = (h00 + h10) / total; let q1 = (h01 + h11) / total;
        var mi: f32 = 0.0;
        let eps = 1.0 / 86400.0;
        if (h00 > 0.0) { mi += (h00/total) * log2((h00/total) / (p0*q0 + eps) + eps); }
        if (h01 > 0.0) { mi += (h01/total) * log2((h01/total) / (p0*q1 + eps) + eps); }
        if (h10 > 0.0) { mi += (h10/total) * log2((h10/total) / (p1*q0 + eps) + eps); }
        if (h11 > 0.0) { mi += (h11/total) * log2((h11/total) / (p1*q1 + eps) + eps); }
        if (lag >= 3u && mi_prev2 > mi_prev && mi_prev <= mi) {

        }

    let max_pts = rs - 2u * best_tau;
    let out_base = s * 4u;
    var cx: f32 = 0.0; var cy: f32 = 0.0; var cz: f32 = 0.0;
    for (var i = 0u; i < max_pts; i++) {

        spread += sqrt(dx*dx + dy*dy + dz*dz);
    }

    out[out_base] = cx; out[out_base + 1u] = cy; out[out_base + 2u] = cz; out[out_base + 3u] = spread;
}
`;

        const tdaShader = `
let PHI = 1.618033988749895;
@group(0) @binding(0) var<storage, read> data: array<f32>;
@group(0) @binding(1) var<storage, read_write> out: array<f32>;
@group(0) @binding(2) var<uniform> params: vec4<f32>;
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
    let s = gid.x;
    let n = u32(params.x);
    let rs = u32(params.y);
    if (s >= n) { return; }
    let base = s * rs;
    let sub = u32(f32(rs) / (PHI * PHI));
    let tau = u32(1.0 + 1.0 / PHI);
    var parent: array<u32, 48>;
    for (var i = 0u; i < 48u; i++) { if (i < sub) { parent[i] = i; } }
    var dists: array<f32, 48>;
    for (var i = 0u; i < sub; i++) {
        var min_d: f32 = abs(data[base] - data[base + tau]);
        let p1 = base + i * tau;
        for (var j = 0u; j < sub; j++) {
            if (i == j) { continue; }
            let p2 = base + j * tau;
            let d = abs(data[p1] - data[p2]);
            if (d < min_d) { min_d = d; }
        }
        dists[i] = min_d;
    }
    for (var i = 1u; i < sub; i++) {
        let key = dists[i]; var j = i;
        while (j > 0u && dists[j - 1u] > key) { dists[j] = dists[j - 1u]; j = j - 1u; }
        dists[j] = key;
    }
    var life_sum: f32 = 0.0; var prev_d: f32 = 0.0; var comps: f32 = f32(sub);
    for (var i = 0u; i < sub; i++) {
        let d = dists[i];
        life_sum += (d - prev_d) * comps;
        comps -= 1.0;
        prev_d = d;
    }
    let out_base = s * 2u;
    out[out_base] = life_sum / f32(sub);
    out[out_base + 1u] = comps;
}
`;

        const teShader = `
let PHI = 1.618033988749895;
@group(0) @binding(0) var<storage, read> data: array<f32>;
@group(0) @binding(1) var<storage, read_write> te: array<f32>;
@group(0) @binding(2) var<uniform> params: vec4<f32>;
fn to_bin(v: f32, mn: f32, mx: f32) -> u32 {
    if (mx <= mn) { return 1u; }
    let t = (v - mn) / (mx - mn);
    if (t < (1.0 / 3.0)) { return 0u; }
    if (t < (2.0 / 3.0)) { return 1u; }
    return 2u;
}
@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
    let a = gid.x; let b = gid.y;
    let n = u32(params.x); let rs = u32(params.y);
    if (a >= n || b >= n || a == b) { return; }
    var a_min: f32 = data[a * rs]; var a_max: f32 = data[a * rs];
    var b_min: f32 = data[b * rs]; var b_max: f32 = data[b * rs];
    for (var i = 0u; i < rs; i++) {
        a_min = min(a_min, data[a * rs + i]); a_max = max(a_max, data[a * rs + i]);
        b_min = min(b_min, data[b * rs + i]); b_max = max(b_max, data[b * rs + i]);
    }
    var hist: array<f32, 27>;
    for (var i = 0u; i < rs - 1u; i++) {
        let ab = to_bin(data[a * rs + i], a_min, a_max);
        let bb = to_bin(data[b * rs + i], b_min, b_max);
        let bn = to_bin(data[b * rs + i + 1u], b_min, b_max);
        hist[ab * 9u + bb * 3u + bn] += 1.0;
    }
    var p_bn_bb: array<f32, 9>;
    for (var ab = 0u; ab < 3u; ab++) {
        for (var bb = 0u; bb < 3u; bb++) {
            for (var bn = 0u; bn < 3u; bn++) {
                p_bn_bb[bb * 3u + bn] += hist[ab * 9u + bb * 3u + bn];
            }
        }
    }
    let total = f32(rs - 1u);
    var te_val: f32 = 0.0;
    for (var ab = 0u; ab < 3u; ab++) {
        for (var bb = 0u; bb < 3u; bb++) {
            for (var bn = 0u; bn < 3u; bn++) {
                let p_joint = hist[ab * 9u + bb * 3u + bn] / total;
                if (p_joint > 0.0) {
                    let eps = 1.0 / 86400.0;
                    let denom_joint = hist[ab * 9u + bb * 3u] + hist[ab * 9u + bb * 3u + 1u] + hist[ab * 9u + bb * 3u + 2u] + eps;
                    let p_bn_given_abb = hist[ab * 9u + bb * 3u + bn] / denom_joint;
                    let p_bb_sum = p_bn_bb[bb * 3u] + p_bn_bb[bb * 3u + 1u] + p_bn_bb[bb * 3u + 2u];
                    let p_bn_given_bb = (p_bn_bb[bb * 3u + bn] + eps) / (p_bb_sum + eps);
          te_val += p_joint * log2(p_bn_given_abb / (p_bn_given_bb + eps));
                }
            }
        }
    }
    te[a * n + b] = max(0.0, te_val);
}
`;
