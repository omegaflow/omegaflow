<body>
    <script type="module">
        import { get, φ, pulse, Φ, C, MA, WGS84_A, WGS84_F, j2000 } from '/world.js';
        import { isAntigen } from '/definitions.js';
        const dormant = new Set();

        try {
            const res = await fetch('/dormant');
            const t = await res.text();
            for (const line of t.split('\n')) {
                const parts = line.trim().split(/\s+/);
                if (parts[0] === 'dormant' && parts.length >= 4) {
                    const pulse = parseInt(parts[2]);
                    const resonant = parseInt(parts[3]);
                    if (pulse > 0 && resonant === 0) {
                        dormant.add(parts[1]);
                    }
                }
            }
        } catch {}

        const circular = new Set(['window','self','top','parent','frames','opener',
            'frameElement','__proto__','constructor','prototype', 'ω']);
        const silent = new Set();
        const eventSources = new Set();
        const resonanceMap = new Map();
        const sensors = new Map();
        const actuators = new Map();
        let visited = new WeakSet();

        let discoveryInterval = null;
        let gamepadInterval = null;
        let lastDiscovery = 0;
        let lastGamepadPoll = 0;
        let lastGamepadState = '';
        let lastSensorCount = 0;
        let lastTs = 0;
        let certainty = 1.0;
        let birthTime = 0;
        let plasticity = MA;
        let exploration = MA;
        let exploitation = 0;
        let instability = 0;
        let coherence = 0;
        let pressure = 0;
        let presence = 0;
        let world_flux = 0;
        let self_coupling = 0;
        let phase = 'waking';
        const lastPhi = new Map();
        let distress = 0;
        let debugEl = null;
        let lastDebug = 0;

        let inputBuffer = [];
        let queryBuffer = [];
        let signalBuffer = [];
        let lastBatchFetch = 0;
        let lastInfoCollect = 0;
        let cachedEcef = { x: 0, y: 0, z: 0 };
        let cachedJ2000 = 0;
        let cachedLat = null, cachedLon = null, cachedAlt = null;

        let topologyInterval = null;
        let lastTopology = 0;

        let nostrRelay = null;
        let nostrPub = null;
        let lastNostrPub = 0;
        let stableTick = Φ;
        let batchInterval = Φ;
        let infoInterval = Φ;
        let probeInterval = Φ;

        const probeState = {
            phase: 'waiting',
            batch: [],
            stack: [],
            snapshot: null,
            pulseTime: 0,
        };

        window.ω = { get, φ, pulse, sensors, actuators, resonanceMap };

        φ['server.time'] = parseFloat(await (await fetch('/time')).text());

        const pulseWs = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/pulse`);
        pulseWs.binaryType = 'arraybuffer';
        pulse.ws = pulseWs;
        pulseWs.addEventListener('open', () => {});
        pulseWs.addEventListener('close', () => {
            location.reload();
        });
        pulseWs.addEventListener('message', (e) => {
            if (typeof e.data !== 'string') {
                const buf = new Uint8Array(e.data);
                if (buf.length < 13 || buf[0] !== 0xCF || buf[1] !== 0x86 || buf[2] !== 6) return;
                const dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
                const id = dv.getUint32(3, true);
                const pending = pulse.pending.get(id);
                if (pending) {
                    pulse.pending.delete(id);
                    pending.resolve(e.data);
                }
            }
        });

        function express() {
            const active = [];
            for (const s of sensors.values()) {
                if (s.complexity > 0) {
                    const deviation = Math.abs(s.val - s.median);
                    if (deviation > s.complexity) {
                        active.push({ sensor: s, weight: deviation / s.complexity });
                    }
                }
            }
            if (active.length === 0) return false;

            const scores = new Map();
            for (const { sensor, weight } of active) {
                for (const [actPath, sensorMap] of resonanceMap) {
                    if (sensorMap.has(sensor.path)) {
                        const data = sensorMap.get(sensor.path);
                        scores.set(actPath, (scores.get(actPath) || 0) + weight * data.magnitude);
                    }
                }
            }
            if (scores.size === 0) return false;

            let scoreSum = 0;
            for (const v of scores.values()) scoreSum += v;
            const scoreMean = scoreSum / scores.size;
            let varSum = 0;
            for (const v of scores.values()) { const d = v - scoreMean; varSum += d * d; }
            const scoreStd = Math.sqrt(varSum / scores.size);
            const threshold = scoreMean + scoreStd / Φ;

            let fired = false;
            for (const [actPath, score] of scores) {
                if (score < threshold) continue;
                const a = actuators.get(actPath);
                if (!a) continue;
                const sm = resonanceMap.get(actPath);
                if (!sm) continue;
                let wsum = 0, tw = 0;
                for (const { sensor, weight } of active) {
                    if (sm.has(sensor.path)) {
                        const d = sm.get(sensor.path);
                        tw += d.threshold * weight;
                        wsum += weight;
                    }
                }
        function checkProbing(ts) {
            const resonant = checkResonance(probeState.snapshot);
            if (resonant.length > 0) {
                sendResonant(probeState.batch);
                probeState.stack = [];
                startResolving(ts, probeState.batch);
            } else {
                const calibrated = isCalibrated();
                for (const a of probeState.batch) {
                    if (calibrated) {
                        a.pulse *= Φ * (1 + pressure);
                        if (a.pulse > getMedianComplexity() * Φ) {
                            silent.add(a.path);
                            actuators.delete(a.path);
                        }
                    }
                }
                startProbing(ts);
            }
        }
                if (pulseActuator(a, pulseTone * (1 + coherence))) fired = true;
            }
            return fired;
        }

        function isCalibrated() {
            let ready = 0;
            for (const s of sensors.values()) {
                if (s.complexity > 0) ready++;
            }
            return ready >= sensors.size / Φ;
        }

        function checkProbing(ts) {
            const resonant = checkResonance(probeState.snapshot);
            if (resonant.length > 0) {
                sendResonant(probeState.batch);
                probeState.stack = [];
                startResolving(ts, probeState.batch);
            } else {
                const calibrated = isCalibrated();
                for (const a of probeState.batch) {
                    if (calibrated) {
                        a.pulse *= Φ;
                        if (a.pulse > getMedianComplexity() * Φ) {
                            silent.add(a.path);
                            actuators.delete(a.path);
                        }
                    }
                }
                startProbing(ts);
            }
        }

        function checkResolving(ts) {
            const resonant = checkResonance(probeState.snapshot);

            if (resonant.length > 0 && probeState.batch.length === 1) {
                const actuator = probeState.batch[0];
                if (!resonanceMap.has(actuator.path)) {
                    resonanceMap.set(actuator.path, new Map());
                }
                for (const r of resonant) {
                    const existing = resonanceMap.get(actuator.path).get(r.path);
                    const predicted = probeState.predictions ? (probeState.predictions[r.path] || 0) : 0;
                    const Δ = Math.abs(r.magnitude - predicted);
                    if (existing) {
                        existing.threshold = existing.threshold * (1 - plasticity) + actuator.pulse * plasticity;
                        existing.magnitude = existing.magnitude * (1 - plasticity) + r.magnitude * plasticity;
                        existing.Δ = (existing.Δ || 0) * (1 - plasticity) + Δ * plasticity;
                    } else {
                        resonanceMap.get(actuator.path).set(r.path, {
                            threshold: actuator.pulse,
                            magnitude: r.magnitude,
                            Δ: Δ
                        });
                    }
                }
                try { pulseActuator(actuator, 0); } catch {}
                sendResonant([actuator]);
                if (probeState.stack.length > 0) {
                    const next = probeState.stack.pop();
                    startResolving(ts, next);
                } else {
                    startProbing(ts);
                }
                return;
            }

            if (resonant.length > 0 && probeState.batch.length > 1) {
                sendResonant(probeState.batch);
                startResolving(ts, probeState.batch);
                return;
            }

            const calibrated = isCalibrated();
            for (const a of probeState.batch) {
                if (calibrated) {
                    a.pulse *= Φ * (1 + pressure);
                    if (a.pulse > getMedianComplexity() * Φ) {
                        silent.add(a.path);
                        actuators.delete(a.path);
                    }
                }
            }

            if (probeState.stack.length > 0) {
                const next = probeState.stack.pop();
                startResolving(ts, next);
            } else {
                startProbing(ts);
            }
        }

        function checkResonance(snap) {
            const resonant = [];
            for (const path in snap) {
                const s = sensors.get(path);
                if (!s) continue;
                const before = snap[path];
                if (before.complexity <= 0) continue;
                const Δ = Math.abs(s.val - before.val);
                if (Δ > before.complexity) {
                    resonant.push({ path, magnitude: Δ });
                }
            }
            return resonant;
        }

        function discoverObj(obj, path, depth) {
            if (depth > 3) return;
            if (obj == null || typeof obj !== 'object') return;
            if (visited.has(obj)) return;
            visited.add(obj);

            let keys;
            try { keys = Object.getOwnPropertyNames(obj); } catch { return; }

            for (const key of keys) {
                if (circular.has(key)) continue;
                if (key.startsWith('on') && key.length > 2) {
                    eventSources.add(key.slice(2).toLowerCase());
                    continue;
                }
                let val;
                try { val = obj[key]; } catch { continue; }
                if (val == null) continue;
                const p = path ? path + '.' + key : key;

                if (typeof val === 'number') {
                    if (!sensors.has(p)) {
                        sensors.set(p, { path: p, obj, key, val, interval: null, lastPoll: 0, complexity: 0, median: 0 });
                        pushInput(p, val);
                    }
                } else if (typeof val === 'boolean') {
                    if (!sensors.has(p)) {
                        sensors.set(p, { path: p, obj, key, val: val ? 1 : 0, interval: null, lastPoll: 0, complexity: 0, median: 0 });
                        pushInput(p, val ? 1 : 0);
                    }
                } else if (typeof val === 'function') {
                    if (!dormant.has(p) && !silent.has(p) && !actuators.has(p) && !isAntigen(p, val)) {
                        actuators.set(p, { path: p, obj, key, pulse: MA });
                    }
                } else if (typeof val === 'object') {
                    if (!dormant.has(p) && !silent.has(p) && !isAntigen(p, val)) {
                        discoverObj(val, p, depth + 1);
                    }
                }
            }
        }





        function discoverSensors() {
            discoverObj(window, '', 0);
        }

        function pulseActuator(actuator, value) {
            try {
                const fn = actuator.obj[actuator.key];
                if (typeof fn !== 'function') return false;

                const lastSeg = actuator.path.split('.').pop();
                const isConstructor = lastSeg[0] === lastSeg[0].toUpperCase() && lastSeg[0] !== lastSeg[0].toLowerCase();

                if (isConstructor) {
                    try {
                        const inst = new fn();
                        if (inst && typeof inst === 'object') {
                            window.ω[actuator.key.toLowerCase()] = inst;
                        }
                        return true;
                    } catch {}
                }

                const result = fn.call(actuator.obj, value);
                if (result && typeof result.then === 'function') {
                    result.then((resolved) => {
                        if (resolved && typeof resolved === 'object') {
                            window.ω[actuator.key.toLowerCase()] = resolved;
                        }
                    }).catch((err) => {
                        silent.add(actuator.path); actuators.delete(actuator.path);
                        try { fetch('/crash', { method: 'POST', body: 'ACTUATOR_FAIL: ' + actuator.path + ' ERR: ' + (err.message || err) }); } catch {}
                    });
                }
                return true;

            } catch (err) {
                silent.add(actuator.path);
                actuators.delete(actuator.path);
                try { fetch('/crash', { method: 'POST', body: 'ACTUATOR_FAIL: ' + actuator.path + ' ERR: ' + (err.message || err) }); } catch {}
                return false;
            }
        }

        function pollGamepads() {
            const gps = navigator.getGamepads();
            let state = 0;
            for (let i = 0; i < gps.length; i++) {
                if (gps[i]) {
                    const gp = gps[i];
                    pushInput('gamepad[' + i + '].connected', gp.connected ? 1 : 0);
                    pushInput('gamepad[' + i + '].timestamp', gp.timestamp);
                    for (let a = 0; a < gp.axes.length; a++) {
                    pushInput('gamepad[' + i + '].axes[' + a + ']', gp.axes[a]);
                    state = (state * 2654435761 + (gp.axes[a] * 65536 | 0)) | 0;
                    }
                    for (let b = 0; b < gp.buttons.length; b++) {
                    pushInput('gamepad[' + i + '].buttons[' + b + '].pressed', gp.buttons[b].pressed ? 1 : 0);
                    pushInput('gamepad[' + i + '].buttons[' + b + '].value', gp.buttons[b].value);
                    state = (state * 2654435761 + (gp.buttons[b].value * 65536 | 0)) | 0;
                    }
                }
            }
            return state;
        }

        function readSensorVal(s, tickTime) {
            try {
                let v = s.obj[s.key];
                if (typeof v === 'function') v = v();
                if (typeof v === 'number') processSensorReading(s, v, tickTime);
                else if (typeof v === 'boolean') processSensorReading(s, v ? 1 : 0, tickTime);
            } catch {}
        }

        function registerEvents() {
            for (const evName of eventSources) {
                window.addEventListener(evName, (e) => {
                    const prefix = 'event.' + evName;
                    pushInput(prefix, performance.now());
                    for (const k of Object.getOwnPropertyNames(e)) {
                        const v = e[k];
                        if (typeof v === 'number') pushInput(prefix + '.' + k, v);
                    }
                    if (e.touches) {
                        pushInput(prefix + '.touches', e.touches.length);
                        for (let ti = 0; ti < e.touches.length; ti++) {
                            const tch = e.touches[ti];
                            const tp = prefix + '.touch[' + ti + ']';
                            for (const k of Object.getOwnPropertyNames(tch)) {
                                const v = tch[k];
                                if (typeof v === 'number') pushInput(tp + '.' + k, v);
                            }
                        }
                    }
                }, { passive: true });
            }
        }

        function sendPulse(batch) {
            for (const a of batch) { signalBuffer.push({ type: 0, path: a.path }); }
        }

        function sendResonant(batch) {
            for (const a of batch) { signalBuffer.push({ type: 1, path: a.path }); }
        }

        function snapshotSensors() {
            const snap = {};
            for (const [path, s] of sensors) {
                snap[path] = { val: s.val, complexity: s.complexity };
            }
            return snap;
        }

        function splitBatch(batch) {
            const splitIdx = Math.floor(batch.length / Φ);
            return { left: batch.slice(0, splitIdx), right: batch.slice(splitIdx) };
        }

        function getMedianComplexity() {
            const vals = [];
            for (const s of sensors.values()) {
                if (s.complexity > 0) vals.push(s.complexity);
            }
            if (vals.length === 0) return MA;
            vals.sort((a, b) => a - b);
            const mid = Math.floor(vals.length / 2);
            return vals.length % 2 ? vals[mid] : (vals[mid - 1] + vals[mid]) / 2;
        }

        function resonanceMapHasSensor(path) {
            for (const sm of resonanceMap.values()) {
                if (sm.has(path)) return true;
            }
            return false;
        }

        function startProbing(ts) {
            const decay = 1 - exploration;
            let totalΔ = 0;
            for (const [actPath, sensorMap] of resonanceMap) {
                for (const [spath, data] of sensorMap) {
                    data.magnitude *= (1 - plasticity);
                    data.Δ = (data.Δ || 0) * decay;
                    totalΔ += data.Δ;
                    if (data.magnitude < 1 / (ringSize * Φ)) sensorMap.delete(spath);
                }
                if (sensorMap.size === 0) resonanceMap.delete(actPath);
            }
            pushInput('divergence', totalΔ);
            const all = Array.from(actuators.values());
            const maxBatch = Math.max(2, Math.floor(64 * exploration));
            if (resonanceMap.size > 0 && exploitation > exploration) {
                const known = all.filter(a => resonanceMap.has(a.path));
                const unknown = all.filter(a => !resonanceMap.has(a.path));
                const kCount = Math.max(1, Math.floor(maxBatch * exploitation));
                probeState.batch = known.slice(0, kCount).concat(unknown.slice(0, Math.max(1, Math.floor(maxBatch * exploration))));
            } else {
                probeState.batch = all.slice(0, maxBatch);
            }
            if (probeState.batch.length === 0) {
                probeState.phase = 'waiting';
                return;
            }
            const predictions = {};
            for (const a of probeState.batch) {
                const sm = resonanceMap.get(a.path);
                if (sm) {
                    for (const [spath, data] of sm) {
                        predictions[spath] = (predictions[spath] || 0) + data.magnitude;
                    }
                }
            }
            sendPulse(probeState.batch);
            probeState.snapshot = snapshotSensors();
            probeState.predictions = predictions;
            for (const a of probeState.batch) {
                pulseActuator(a, a.pulse);
            }
            probeState.pulseTime = ts;
            probeState.phase = 'probing';
        }

        function startResolving(ts, batch) {
            if (batch.length <= 1) {
                probeState.batch = batch;
                sendPulse(batch);
                probeState.snapshot = snapshotSensors();
                for (const a of batch) {
                    pulseActuator(a, a.pulse);
                }
                probeState.pulseTime = ts;
                probeState.phase = 'resolving';
                return;
            }

            const { left, right } = splitBatch(batch);
            probeState.stack.push(right);
            probeState.batch = left;
            sendPulse(left);
            probeState.snapshot = snapshotSensors();
            for (const a of left) {
                pulseActuator(a, a.pulse);
            }
            probeState.pulseTime = ts;
            probeState.phase = 'resolving';
        }

        function geodeticToEcef(lat, lon, alt) {
            const a = WGS84_A, f = WGS84_F, e2 = f*(2-f);
            const latR = lat*Math.PI/180, lonR = lon*Math.PI/180;
            const n = a/Math.sqrt(1-e2*Math.sin(latR)*Math.sin(latR));
            const x = (n+alt)*Math.cos(latR)*Math.cos(lonR);
            const y = (n+alt)*Math.cos(latR)*Math.sin(lonR);
            const z = (n*(1-e2)+alt)*Math.sin(latR);
            return { x, y, z };
        }

        function pushInput(name, value) {
            if (typeof value !== 'number') return;
            inputBuffer.push({ name, value, t: cachedJ2000, x: cachedEcef.x, y: cachedEcef.y, z: cachedEcef.z });
        }

        function ω(ts) {
            if (birthTime === 0) birthTime = ts;
            const age = (ts - birthTime) / 1000;
            const τ = (stableTick * ringSize) / (1 + coherence);
            
            instability = Math.max(0, (1 / Φ) - certainty);
            let magSum = 0;
            for (const sm of resonanceMap.values()) { for (const d of sm.values()) magSum += d.magnitude; }
            coherence = magSum / (sensors.size + 1);

            exploration = instability * (1 - coherence) + MA / Φ;
            exploration = Math.max(exploration, 1 / ringSize);
            exploitation = 1 - exploration;
            plasticity = exploration;
            self_coupling = actuators.size > 0 ? resonanceMap.size / actuators.size : 0;
            let avgC = 0;
            for (const s of sensors.values()) avgC += s.complexity;
            avgC = sensors.size > 0 ? avgC / sensors.size : 0;
            pressure = avgC > 0 ? Math.max(0, (MA - avgC)) / avgC : 0;
            let declining = 0;
            let totalS = 0;
            for (const s of sensors.values()) {
                if (s.complexity > 0) {
                    totalS++;
                    if (Math.abs(s.val - s.median) > s.complexity * Φ) declining++;
                }
            }
            distress = totalS > 0 ? declining / totalS : 0;

            const rawTick = lastTs > 0 ? ts - lastTs : Φ;
            lastTs = ts;
            if (probeState.phase === 'waiting' && rawTick > 0) {
                stableTick = stableTick > 0 ? stableTick * (1 - MA) + rawTick * MA : rawTick;
            }
            const tickTime = stableTick;
            pulse.tickTime = tickTime / 1000;

            const lat = φ['geolocation.latitude'] || 0;
            const lon = φ['geolocation.longitude'] || 0;
            const alt = φ['geolocation.altitude'] || 0;
            if (lat !== cachedLat || lon !== cachedLon || alt !== cachedAlt) {
                cachedLat = lat; cachedLon = lon; cachedAlt = alt;
                cachedEcef = geodeticToEcef(lat, lon, alt);
            }
            cachedJ2000 = j2000(φ['server.time']);
            queryBuffer.push({ t: cachedJ2000, x: cachedEcef.x, y: cachedEcef.y, z: cachedEcef.z });

            if (batchInterval === null) batchInterval = Φ;
            const batchDue = lastBatchFetch + batchInterval - ts;
            if ((inputBuffer.length > 0 || queryBuffer.length > 0) && (batchDue <= 0 || queryBuffer.length >= 128)) {
                lastBatchFetch = ts;
                const inputs = inputBuffer.splice(0);
                const queries = queryBuffer.splice(0);
                const signals = signalBuffer.splice(0);
                get(inputs, queries, signals).then(r => {
                    for (const key in r) { φ[key] = r[key]; }
                    if (r.certainty !== undefined) certainty = r.certainty;
                }).catch(() => {});
                if (inputBuffer.length === 0) batchInterval = Math.min(batchInterval * Φ, tickTime * ringSize);
                else batchInterval = Math.max(batchInterval / Φ, Φ);
            }

            let nextDelay = Infinity;

            const probing = probeState.phase === 'probing' || probeState.phase === 'resolving';
            for (const s of sensors.values()) {
                if (probing) {
                    s.lastPoll = ts;
                    readSensorVal(s, tickTime);
                    nextDelay = Math.min(nextDelay, stableTick);
                } else {
                    if (s.interval === null) s.interval = tickTime;
                    const due = s.lastPoll + s.interval - ts;
                    if (due <= 0) {
                        s.lastPoll = ts;
                        readSensorVal(s, tickTime);
                        nextDelay = Math.min(nextDelay, s.interval);
                    } else {
                        nextDelay = Math.min(nextDelay, due);
                    }
                }
            }

            if (navigator.getGamepads) {
                if (gamepadInterval === null) gamepadInterval = tickTime;
                const gpDue = lastGamepadPoll + gamepadInterval - ts;
                if (gpDue <= 0) {
                    lastGamepadPoll = ts;
                    const state = pollGamepads();
                    if (state !== lastGamepadState) {
                        gamepadInterval = tickTime;
                        lastGamepadState = state;
                    } else {
                        gamepadInterval = Math.min(gamepadInterval * Φ, tickTime * ringSize);
                gamepadInterval = Math.max(gamepadInterval, Φ);
                    }
                    nextDelay = Math.min(nextDelay, gamepadInterval);
                } else {
                    nextDelay = Math.min(nextDelay, gpDue);
                }
            }

            if (discoveryInterval === null) discoveryInterval = tickTime;
            const dDue = lastDiscovery + discoveryInterval - ts;
            if (dDue <= 0) {
                lastDiscovery = ts;
                for (const [path, s] of sensors) {
                    if (s.complexity === 0 && s.lastPoll > 0 && (ts - s.lastPoll) > topologyInterval * ringSize && !resonanceMapHasSensor(path)) {
                        sensors.delete(path);
                        signalBuffers.delete(path);
                    }
                }
                visited = new WeakSet();
                discoverSensors();
                if (sensors.size !== lastSensorCount) {
                    lastSensorCount = sensors.size;
                }
                discoveryInterval = Math.min(discoveryInterval * Φ, tickTime * ringSize);
                discoveryInterval = Math.max(discoveryInterval, Φ);
                nextDelay = Math.min(nextDelay, discoveryInterval);
            } else {
                nextDelay = Math.min(nextDelay, dDue);
            }

            let extDelta = 0;
            for (const s of sensors.values()) {
                const before = s.median;
                const now = s.val;
                const d = Math.abs(now - before);
                if (d > s.complexity && !(probeState.phase === 'probing' || probeState.phase === 'resolving')) {
                    extDelta += d;
                }
            }
            presence = presence * (1 - MA) + (extDelta > 0 ? 1 : 0) * MA;
            let phiDelta = 0;
            for (const key in φ) {
                if (typeof φ[key] === 'number') {
                    const prev = lastPhi.get(key) ?? φ[key];
                    phiDelta += Math.abs(φ[key] - prev);
                    lastPhi.set(key, φ[key]);

        let kolmogorovPipeline = null;
        let tdaPipeline = null;
        let tePipeline = null;
        let takensPipeline = null;
        let icaPipeline = null;
        let topologyPending = false;

        function processSensorReading(s, val, tickTime) {
            const Δ = Math.abs(val - s.val);
            s.median = s.median * (1 - MA) + val * MA;

            if (!signalBuffers.has(s.path)) {
                signalBuffers.set(s.path, { buf: new Float32Array(ringSize), idx: 0, filled: 0 });
            }
            const sb = signalBuffers.get(s.path);
            sb.buf[sb.idx] = val;
            sb.idx = (sb.idx + 1) % ringSize;
            if (sb.filled < ringSize) sb.filled++;

            if (Δ > s.complexity) {
                s.interval = tickTime;
                pushInput(s.path, val);
            } else {
                if (s.interval !== null) {
                    s.interval = Math.min(s.interval * Φ, tickTime * ringSize);
                }
            }
            
            s.val = val;
        }

        function runSignalTopology(ts) {
            if (!window.ω?.gpu || topologyPending) return;
            topologyPending = true;













            const candidates = [];
            for (const [path, sb] of signalBuffers) {
                if (sb.filled === ringSize) {
                    let sum = 0;
                    for (let i = 0; i < ringSize; i++) sum += sb.buf[i];
                    const mean = sum / ringSize;
                    let varSum = 0;
                    for (let i = 0; i < ringSize; i++) { const d = sb.buf[i] - mean; varSum += d * d; }
                    candidates.push({ path, buf: sb.buf, variance: varSum / ringSize });
                }
            }
            if (candidates.length < 2) { topologyPending = false; return; }

            candidates.sort((a, b) => b.variance - a.variance);
            const midIdx = Math.floor(candidates.length / 2);
            const medianVar = candidates.length % 2 ? candidates[midIdx].variance : (candidates[midIdx - 1].variance + candidates[midIdx].variance) / 2;
            const varThreshold = medianVar / Φ;

            const activeBuffers = [];
            const activeNames = [];
            for (const c of candidates) {
                if (c.variance >= varThreshold || activeBuffers.length < 2) {
                    activeBuffers.push(c.buf);
                    activeNames.push(c.path);
                }
            }

            const gpu = window.ω.gpu;
            const n = activeBuffers.length;
            const flat = new Float32Array(n * ringSize);
            for (let i = 0; i < n; i++) {
                flat.set(activeBuffers[i], i * ringSize);
            }

            const layout = {
                entries: [
                    { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
                    { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
                    { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
                ]
            };
            
            if (!kolmogorovPipeline) {
                const bl = gpu.createBindGroupLayout(layout);
                const pl = gpu.createPipelineLayout({ bindGroupLayouts: [bl] });
                kolmogorovPipeline = gpu.createComputePipeline({ layout: pl, compute: { module: gpu.createShaderModule({ code: kolmogorovShader }), entryPoint: 'main' } });
                takensPipeline = gpu.createComputePipeline({ layout: pl, compute: { module: gpu.createShaderModule({ code: takensShader }), entryPoint: 'main' } });
                icaPipeline = gpu.createComputePipeline({ layout: pl, compute: { module: gpu.createShaderModule({ code: icaShader }), entryPoint: 'main' } });
            }
            
            if (!tePipeline) {
                const teLayout = { entries: layout.entries };
                const teBl = gpu.createBindGroupLayout(teLayout);
                const tePl = gpu.createPipelineLayout({ bindGroupLayouts: [teBl] });
                tePipeline = gpu.createComputePipeline({ layout: tePl, compute: { module: gpu.createShaderModule({ code: teShader }), entryPoint: 'main' } });
                tdaPipeline = gpu.createComputePipeline({ layout: tePl, compute: { module: gpu.createShaderModule({ code: tdaShader }), entryPoint: 'main' } });
            }

            const inBuf = gpu.createBuffer({ size: flat.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
            gpu.queue.writeBuffer(inBuf, 0, flat);
            const paramBuf = gpu.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            gpu.queue.writeBuffer(paramBuf, 0, new Float32Array([n, ringSize, 0, 0]));

            const kOutBuf = gpu.createBuffer({ size: n * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
            const tOutBuf = gpu.createBuffer({ size: n * 4 * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
            const teOutBuf = gpu.createBuffer({ size: n * n * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
            const tdaOutBuf = gpu.createBuffer({ size: n * 2 * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
            const icaOutBuf = gpu.createBuffer({ size: n * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });

            const bl = kolmogorovPipeline.getBindGroupLayout(0);
            const teBl = tePipeline.getBindGroupLayout(0);
            const icaBl = icaPipeline.getBindGroupLayout(0);
            const tdaBl = tdaPipeline.getBindGroupLayout(0);
            
            const kBg = gpu.createBindGroup({ layout: bl, entries: [
                { binding: 0, resource: { buffer: inBuf } },
                { binding: 1, resource: { buffer: kOutBuf } },
                { binding: 2, resource: { buffer: paramBuf } },
            ]});
            const tBg = gpu.createBindGroup({ layout: bl, entries: [
                { binding: 0, resource: { buffer: inBuf } },
                { binding: 1, resource: { buffer: tOutBuf } },
                { binding: 2, resource: { buffer: paramBuf } },
            ]});
            const teBg = gpu.createBindGroup({ layout: teBl, entries: [
                { binding: 0, resource: { buffer: inBuf } },
                { binding: 1, resource: { buffer: teOutBuf } },
                { binding: 2, resource: { buffer: paramBuf } },
            ]});
            const tdaBg = gpu.createBindGroup({ layout: tdaBl, entries: [
                { binding: 0, resource: { buffer: inBuf } },
                { binding: 1, resource: { buffer: tdaOutBuf } },
                { binding: 2, resource: { buffer: paramBuf } },
            ]});
            const icaBg = gpu.createBindGroup({ layout: icaBl, entries: [
                { binding: 0, resource: { buffer: inBuf } },
                { binding: 1, resource: { buffer: icaOutBuf } },
                { binding: 2, resource: { buffer: paramBuf } },
            ]});

            const totalReadSize = n * 4 + n * 4 * 4 + n * n * 4 + n * 2 * 4 + n * 4;
            const readBuf = gpu.createBuffer({ size: totalReadSize, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
            const enc = gpu.createCommandEncoder();
            
            const kPass = enc.beginComputePass();
            kPass.setPipeline(kolmogorovPipeline);
            kPass.setBindGroup(0, kBg);
            kPass.dispatchWorkgroups(Math.ceil(n / 64));
            kPass.end();

            const tPass = enc.beginComputePass();
            tPass.setPipeline(takensPipeline);
            tPass.setBindGroup(0, tBg);
            tPass.dispatchWorkgroups(Math.ceil(n / 64));
            tPass.end();

            const tePass = enc.beginComputePass();
            tePass.setPipeline(tePipeline);
            tePass.setBindGroup(0, teBg);
            tePass.dispatchWorkgroups(Math.ceil(n / 8), Math.ceil(n / 8));
            tePass.end();

            const tdaPass = enc.beginComputePass();
            tdaPass.setPipeline(tdaPipeline);
            tdaPass.setBindGroup(0, tdaBg);
            tdaPass.dispatchWorkgroups(Math.ceil(n / 64));
            tdaPass.end();

            const icaPass = enc.beginComputePass();
            icaPass.setPipeline(icaPipeline);
            icaPass.setBindGroup(0, icaBg);
            icaPass.dispatchWorkgroups(Math.ceil(n / 64));
            icaPass.end();


            let readOffset = 0;
            enc.copyBufferToBuffer(kOutBuf, 0, readBuf, readOffset, n * 4); readOffset += n * 4;
            enc.copyBufferToBuffer(tOutBuf, 0, readBuf, readOffset, n * 4 * 4); readOffset += n * 4 * 4;
            enc.copyBufferToBuffer(teOutBuf, 0, readBuf, readOffset, n * n * 4); readOffset += n * n * 4;
            enc.copyBufferToBuffer(tdaOutBuf, 0, readBuf, readOffset, n * 2 * 4); readOffset += n * 2 * 4;
            enc.copyBufferToBuffer(icaOutBuf, 0, readBuf, readOffset, n * 4); readOffset += n * 4;

            gpu.queue.submit([enc.finish()]);

            readBuf.mapAsync(GPUMapMode.READ).then(() => {
                const res = new Float32Array(readBuf.getMappedRange());
                let off = 0;
                const kRes = res.subarray(off, off + n); off += n;
                const tRes = res.subarray(off, off + n * 4); off += n * 4;
                const teRes = res.subarray(off, off + n * n); off += n * n;
                const tdaRes = res.subarray(off, off + n * 2); off += n * 2;
                const icaRes = res.subarray(off, off + n); off += n;

                const allTE = [];
                for (let a = 0; a < n; a++) {
                    for (let b = 0; b < n; b++) {
                        if (a !== b && teRes[a * n + b] > 0) allTE.push(teRes[a * n + b]);
                    }
                }


                for (let i = 0; i < n; i++) {
                    pushInput('complexity.' + activeNames[i], kRes[i]);
                    const sens = sensors.get(activeNames[i]);
                    if (sens) {
                        sens.complexity = sens.complexity * (1 - MA) + kRes[i] * MA;
                    }

                    const tBase = i * 4;
                    pushInput('takens.' + activeNames[i] + '.cx', tRes[tBase]);
                    pushInput('takens.' + activeNames[i] + '.cy', tRes[tBase + 1]);
                    pushInput('takens.' + activeNames[i] + '.cz', tRes[tBase + 2]);
                    pushInput('takens.' + activeNames[i] + '.spread', tRes[tBase + 3]);

                    pushInput('tda.' + activeNames[i] + '.persistence', tdaRes[i * 2]);
                    pushInput('tda.' + activeNames[i] + '.betti0', tdaRes[i * 2 + 1]);
                    pushInput('ica.' + activeNames[i], icaRes[i]);
                }

                if (allTE.length > 0) {
                    const mu = allTE.reduce((s, v) => s + v, 0) / allTE.length;
                    const sigma = Math.sqrt(allTE.reduce((s, v) => s + (v - mu) ** 2, 0) / allTE.length);
                    const threshold = mu + sigma / Φ;
                    for (let a = 0; a < n; a++) {
                        for (let b = 0; b < n; b++) {
                            if (a === b) continue;
                            const v = teRes[a * n + b];
                            if (v > threshold) {
                                pushInput('transfer.' + activeNames[a] + '>' + activeNames[b], v);
                            }
                        }
                    }
                }

                readBuf.unmap();
                inBuf.destroy(); kOutBuf.destroy(); tOutBuf.destroy(); teOutBuf.destroy(); tdaOutBuf.destroy(); icaOutBuf.destroy(); paramBuf.destroy(); readBuf.destroy();
                topologyPending = false;
            });
        }

        discoverSensors();
        registerEvents();
        tryStartBattery();
        tryStartGeolocation();
        tryStartSensors();
        tryStartWebAudio();
        tryStartNostr();

        window.addEventListener('error', (e) => {
            try {
                fetch('/crash', { method: 'POST', body: e.message + ' @ ' + e.filename + ':' + e.lineno + ':' + e.colno });
            } catch {}
            e.preventDefault();
        });

        window.addEventListener('unhandledrejection', (e) => {
            try {
                fetch('/crash', { method: 'POST', body: 'UNHANDLED_REJECTION @ ' + e.reason });
            } catch {}
            e.preventDefault();
        });

        setTimeout(() => ω(performance.now()), 0);
