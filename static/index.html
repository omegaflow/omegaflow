                    return device.open().then(() => { if (device.configuration === null) return device.selectConfiguration(1).then(() => device); return device; }).then(() => device.claimInterface(0)).then(() => {
                        activeUsbDevice = device;
                        const alt = device.configuration.interfaces[0].alternates[0];
                        const inEp = alt.endpoints.find(e => e.direction === 'in');
                        if (inEp) {
                            async function pollUsb() {
                                if (!activeUsbDevice || !activeUsbDevice.opened) return;
                                try {
                                    const result = await activeUsbDevice.transferIn(inEp.endpointNumber, 64);
                                    if (result.data) { const bytes = new Uint8Array(result.data.buffer, result.data.byteOffset, result.data.byteLength); for (let i = 0; i < bytes.length; i++) recordSample('usb.byte_' + i, bytes[i] / 255); }
                                } catch {}
                                pollUsb();
                            }
                            pollUsb();
                        }
                    });
                }).catch(() => {});
            }
            if (navigator.bluetooth) {
                navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['generic_access'] }).then(device => {
                    return device.gatt.connect().then(server => server.getPrimaryServices());
                }).then(services => {
                    for (const service of services) {
                        service.getCharacteristics().then(chars => {
                            for (const ch of chars) {
                                if (ch.properties.read) {
                                    const url = 'bluetooth.' + service.uuid + '.' + ch.uuid;
                                    if (!indexMap.has(url)) {
                                        const chRef = ch;
                                        registerOscillator(url, Number.EPSILON);
                                        pollFns.push(async () => { try { const dv = await chRef.readValue(); recordSample(url, dv.getFloat64(0, true)); } catch {} });
                                    }
                                }
                                if (ch.properties.write && !activeBtChar) activeBtChar = ch;
                            }
                        }).catch(() => {});
                    }
                }).catch(() => {});
            }
            if (navigator.hid) {
                navigator.hid.requestDevice({ filters: [] }).then(devices => {
                    if (!devices || devices.length === 0) return;
                    const device = devices[0];
                    return device.open().then(() => {
                        activeHidDevice = device;
                        device.addEventListener('inputreport', (e) => { const bytes = new Uint8Array(e.data.buffer); for (let i = 0; i < bytes.length; i++) recordSample('hid.byte_' + i, bytes[i] / 255); });
                    });
                }).catch(() => {});
            }
        }
        function registerGamepads() {
            const pads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let p = 0; p < pads.length; p++) {
                const pad = pads[p];
                if (!pad) continue;
                for (let a = 0; a < pad.axes.length; a++) {
                    const url = `gamepad.${p}.axes.${a}`;
                    if (!indexMap.has(url)) {
                        const ax = a, pn = p;
                        registerOscillator(url, pad.axes[a]);
                        pollFns.push(() => { const gp = navigator.getGamepads()[pn]; if (gp) recordSample(url, gp.axes[ax]); });
                    }
                }
                for (let b = 0; b < pad.buttons.length; b++) {
                    const url = `gamepad.${p}.buttons.${b}`;
                    if (!indexMap.has(url)) {
                        const bn = b, pn = p;
                        registerOscillator(url, pad.buttons[b].value);
                        pollFns.push(() => { const gp = navigator.getGamepads()[pn]; if (gp) recordSample(url, gp.buttons[bn].value); });
                    }
                }
            }
        }
        async function ω(ts) {
            const rawTick = lastTs > 0 ? ts - lastTs : Φ;
            lastTs = ts;
            stableTick = stableTick * (1 - ma()) + rawTick * ma();
            transport.tickTime = stableTick;

            tPresence += rawTick / 1000.0;
            if (presenceFree) {
                const dtF = tPresence - freeT0;
                xPresence = freeP[0] + freeV[0] * dtF;
                yPresence = freeP[1] + freeV[1] * dtF;
                zPresence = freeP[2] + freeV[2] * dtF;
            } else {
                const eNow = terra(tPresence);
                xPresence = eNow[0] + pxOffset;
                yPresence = eNow[1] + pyOffset;
                zPresence = eNow[2] + pzOffset;
            }

            registerGamepads();
            for (const fn of pollFns) { try { fn(); } catch {} }

            const dtClarity = Math.abs(tPresence - prevTPresence);
            clarity = Math.exp(-dtClarity / (1.0 + measureRms()));
            prevTPresence = tPresence;
            const transmitList = [];
            for (let i = 0; i < oscillators.length; i++) { const osc = oscillators[i]; let val = osc.median; if (typeof val !== 'number' || !isFinite(val)) continue; const delta = Math.abs(val - (osc.lastTransmitted || 0)); if (delta > Number.EPSILON) { osc.lastTransmitted = val; transmitList.push({ name: osc.url, value: val }); } }
            syncField(transmitList, windowQueries()).catch(() => {});
            adaptWindow(rawTick);
            manifestWindow();
            const manifestStart = performance.now();
            for (const surface of surfaces) { try { surface.manifest(); } catch {} }
            lastManifestTime = performance.now() - manifestStart;
            const g = measureRms(); const vC = measureRateOfChange();
            certainty = Math.exp(-vC / (g + (1.0 / C)));
            if (!debugEl) {
                debugEl = document.createElement('textarea');
                debugEl.readOnly = true;
                debugEl.setAttribute('wrap', 'off');
                debugEl.style.cssText = 'position:fixed;bottom:12px;left:12px;font:11px "SF Mono",Menlo,Consolas,monospace;color:#a89878;background:rgba(10,9,8,0.85);padding:14px 16px;margin:0;border:none;border-radius:4px;z-index:9999;line-height:1.65;width:440px;height:400px;resize:none;backdrop-filter:blur(10px);box-shadow:0 4px 24px rgba(0,0,0,0.4);overflow:hidden;white-space:pre;';
                document.body.appendChild(debugEl);
            }
            if (ts - lastDebug > stableTick * 6 || lastDebug === 0) {
                lastDebug = ts;
                let maxFill = 0;
                for (let i = 0; i < oscillators.length; i++) maxFill = Math.max(maxFill, oscillators[i].filled);
                const xStr = isFinite(xPresence) ? xPresence.toExponential(3) : 'NaN';
                const yStr = isFinite(yPresence) ? yPresence.toExponential(3) : 'NaN';
                const zStr = isFinite(zPresence) ? zPresence.toExponential(3) : 'NaN';
                let tps = stableTick > 0 ? (1000 / stableTick).toFixed(1) : '0';
                let topOsc = [];
                for (let i = 0; i < oscillators.length; i++) {
                    const o = oscillators[i];
                    if (o.filled > 0) {
                        topOsc.push({ u: o.url.substring(0, 32), v: o.median });
                    }
                }
                topOsc.sort((a, b) => Math.abs(b.v) - Math.abs(a.v));
                const topLines = topOsc.slice(0, 12).map(t => `  ${t.u}: ${t.v.toPrecision(4)}`).join('\n');

                debugEl.value =
                    "omegaflow field\n\n" +
                    "Presence\n" +
                    `  X: ${xStr}\n` +
                    `  Y: ${yStr}\n` +
                    `  Z: ${zStr}\n` +
                    `  Time: ${tPresence.toFixed(1)}\n` +
                    `  Frame: ${presenceFree ? 'free-fall' : 'anchored'}\n\n` +
                    `Surface\n` +
                    `  Pixels: ${RX}x${RY}\n` +
                    `  Scale: ${gridStep.toExponential(1)} m/px\n` +
                    `  Oscillators in window: ${rawWindowResponse.length}\n\n` +
                    "System\n" +
                    `  Oscillators: ${oscillators.length}\n` +
                    `  Ring buffer: ${maxFill}/${CAPTURE_RING_SIZE} samples\n` +
                    `  Ticks per second: ${tps}\n\n` +
                    "Performance\n" +
                    `  GPU: ${gpuWorkerReady ? 'active' : 'none'}\n` +
                    `  Frame:     ${rawTick.toFixed(1)}ms\n` +
                    `  Manifest:  ${lastManifestTime.toFixed(1)}ms\n\n` +
                    "Field\n" +
                    `  Certainty:      ${certainty.toFixed(4)}\n` +
                    `  Clarity:        ${clarity.toFixed(4)}\n` +
                    `  Gravity:        ${g.toFixed(3)}\n` +
                    `  Rate of change: ${vC.toFixed(4)}\n\n` +
                    "Connection\n" +
                    `  WebSocket: ${transport.socket ? 'open' : 'closed'}\n` +
                    `  Round trip: ${transport.rtt.toFixed(0)}ms\n\n` +
                    "Active oscillators\n" +
                    (topLines || "  Waiting for interaction...");
            }
            requestAnimationFrame(ω);
        }
        if (localFlowConsented) {
            const sensorNames = ['Accelerometer', 'Gyroscope', 'Magnetometer', 'AmbientLightSensor', 'LinearAccelerationSensor', 'GravitySensor', 'AbsoluteOrientationSensor', 'RelativeOrientationSensor'];
            for (const name of sensorNames) {
                if (typeof window[name] !== 'undefined') {
                    try {
                        const inst = new window[name]({ frequency: Math.min(60, stableTick > 0 ? Math.round(1000 / stableTick) : 60), referenceFrame: 'device' });
                        const prefix = name.toLowerCase();
                        inst.addEventListener('reading', () => {
                            for (const p of Object.getOwnPropertyNames(inst)) {
                                if (p === 'timestamp' || p === 'activated') continue;
                                try { const v = inst[p]; if (typeof v === 'number') recordSample(prefix + '.' + p, v); } catch(e) {}
                            }
                        });
                        inst.start();
                            } catch(e) {}
                        }
            }
        }
        window.addEventListener('mousemove', (e) => { recordSample('event.mousemove.x', e.clientX); recordSample('event.mousemove.y', e.clientY); }, { passive: true });
        window.addEventListener('mousedown', (e) => { recordSample('event.mousedown.button', e.button); }, { passive: true });
        window.addEventListener('mouseup', (e) => { recordSample('event.mouseup.button', e.button); }, { passive: true });
        window.addEventListener('wheel', (e) => { recordSample('event.wheel.deltaY', e.deltaY); }, { passive: true });
        window.addEventListener('touchstart', (e) => { if (e.touches.length > 0) { recordSample('event.touchstart.x', e.touches[0].clientX); recordSample('event.touchstart.y', e.touches[0].clientY); } }, { passive: true });
        window.addEventListener('touchmove', (e) => { if (e.touches.length > 0) { recordSample('event.touchmove.x', e.touches[0].clientX); recordSample('event.touchmove.y', e.touches[0].clientY); } }, { passive: true });
        window.addEventListener('touchend', (e) => { recordSample('event.touchend.count', e.changedTouches.length); }, { passive: true });
        window.addEventListener('keydown', (e) => { recordSample('event.keydown.code', e.keyCode); }, { passive: true });
        window.addEventListener('keyup', (e) => { recordSample('event.keyup.code', e.keyCode); }, { passive: true });
        window.addEventListener('click', (e) => { recordSample('event.click.x', e.clientX); recordSample('event.click.y', e.clientY); }, { passive: true });
        window.addEventListener('resize', () => { RX = window.innerWidth; RY = window.innerHeight; recordSample('event.resize.width', RX); recordSample('event.resize.height', RY); }, { passive: true });
        window.addEventListener('deviceorientation', (e) => { recordSample('event.deviceorientation.alpha', e.alpha || 0); recordSample('event.deviceorientation.beta', e.beta || 0); recordSample('event.deviceorientation.gamma', e.gamma || 0); }, { passive: true });
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'd' && debugEl) {
                debugEl.style.display = (debugEl.style.display === 'none') ? 'block' : 'none';
            }
        });
        window.addEventListener('keydown', (e) => {
            const mult = e.shiftKey ? 64 : 1;
            const step = C * (transport.tickTime / 1000) / 256 * mult;
            const tstep = transport.tickTime / 1000 * mult;
            if (e.key === 'f' && !presenceFree) {
                const eA = terra(tPresence), eB = terra(tPresence + 1.0);
                freeV = [eB[0] - eA[0], eB[1] - eA[1], eB[2] - eA[2]];
                freeP = [xPresence, yPresence, zPresence];
                freeT0 = tPresence;
                presenceFree = true;
                e.preventDefault();
                return;
            }
            if (e.key === 'a' && presenceFree) {
                const eN = terra(tPresence);
                pxOffset = xPresence - eN[0];
                pyOffset = yPresence - eN[1];
                pzOffset = zPresence - eN[2];
                presenceFree = false;
                e.preventDefault();
                return;
            }
            switch (e.key) {
                case 'ArrowUp': if (presenceFree) freeV[1] += step; else pyOffset += step; break;
                case 'ArrowDown': if (presenceFree) freeV[1] -= step; else pyOffset -= step; break;
                case 'ArrowRight': if (presenceFree) freeV[0] += step; else pxOffset += step; break;
                case 'ArrowLeft': if (presenceFree) freeV[0] -= step; else pxOffset -= step; break;
                case 'PageUp': if (presenceFree) freeV[2] += step; else pzOffset += step; break;
                case 'PageDown': if (presenceFree) freeV[2] -= step; else pzOffset -= step; break;
                case ',': tPresence -= tstep; break;
                case '.': tPresence += tstep; break;
                case '+': gridStep *= 0.5; break;
                case '-': gridStep *= 2.0; break;
                default: return;
            }
            e.preventDefault();
        });
        window.addEventListener('error', (e) => { reportState('ERROR', e.message + ' @ ' + e.filename + ':' + e.lineno); e.preventDefault(); });
        window.addEventListener('unhandledrejection', (e) => { reportState('REJECTION', String(e.reason)); e.preventDefault(); });
        requestAnimationFrame(ω);
    </script>
